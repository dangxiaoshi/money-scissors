<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金钱剪刀 · AI 播客粗剪</title>
  <link rel="stylesheet" href="css/shared.css?v=20260529b">
</head>
<body>
  <main class="shell">
    <header class="top-chrome">
      <div class="top-brand">
        <span class="top-mark">✂️</span>
        <div>
          <div class="top-title">金钱剪刀</div>
          <div class="top-sub">AI 帮你剪播客 · 上传 → 转录 → 审查 → 导出</div>
        </div>
      </div>
      <div class="top-actions">
        <a class="secondary-btn inline-btn" id="admin-link" href="/admin" hidden>后台</a>
        <span class="user-chip" id="user-phone"></span>
        <button class="secondary-btn inline-btn" id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <section class="card">
      <div class="label">上传音频</div>
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">🎙️</div>
        <div class="upload-title">点击或拖拽 mp3 / wav / m4a</div>
        <div class="upload-hint">最大 500MB，桌面 Chrome / Safari / Edge 使用体验最好</div>
        <input type="file" id="audio-file" accept="audio/*" hidden>
      </div>

      <div class="file-pill" id="file-pill">
        <strong id="file-name"></strong>
        <span id="file-size"></span>
      </div>

      <div class="form-row">
        <label for="speaker-count">说话人数</label>
        <input id="speaker-count" type="number" min="1" max="10" step="1" value="2">
      </div>

      <div class="actions">
        <button class="primary-btn" id="start-btn">开始处理</button>
        <div class="error" id="error"></div>
      </div>

      <div class="notice">
        音频会先上传到受控服务器生成公网音频 URL，再交给阿里云 FunASR 转录。
      </div>
    </section>

    <section class="card progress-card" id="progress-card">
      <div class="progress-head">
        <div class="progress-title">处理进度</div>
        <div class="progress-elapsed mono" id="progress-elapsed">已用 0:00</div>
      </div>
      <div class="step-list" id="step-list"></div>
      <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    </section>
  </main>

  <div class="modal" id="speaker-modal" role="dialog" aria-modal="true" aria-labelledby="speaker-modal-title">
    <div class="modal-panel">
      <h2 class="modal-title" id="speaker-modal-title">请给说话人起名字</h2>
      <p class="modal-sub">转录已经完成。下面是每个 Speaker 的前几句示例，填完姓名后才会继续生成审查页。</p>
      <div id="speaker-form"></div>
      <div class="modal-actions">
        <button class="primary-btn" id="speaker-confirm" style="width:auto">确认并继续</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=20260606-4"></script>
</body>
</html>
