<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金钱剪刀 · Show Notes 助手</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        :root {
          --gold-1: #c8952a;
          --gold-2: #e8b84b;
          --gold-3: #f5d06a;
          --text-dark: #1a1209;
          --text-mid: #5a4a2a;
          --text-light: #9a8a6a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            padding: 32px 24px;
            color: var(--text-dark);
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-dark);
        }

        .header p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .api-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(200,149,42,0.2);
            border-radius: 10px;
        }

        .api-row label {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
        }

        .api-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 13px;
            color: #333;
            background: transparent;
            font-family: 'SF Mono', 'Consolas', monospace;
        }

        .api-row input::placeholder { color: #ccc; }

        .cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 640px) {
            .cols { grid-template-columns: 1fr; }
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        textarea {
            width: 100%;
            border: 1px solid rgba(200,149,42,0.25);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 14px;
            line-height: 1.75;
            color: #1a1209;
            background: rgba(255,255,255,0.85);
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        textarea:focus {
            outline: none;
            border-color: #c8952a;
        }

        textarea::placeholder { color: #ccc; }

        #input { min-height: 260px; }
        #output { min-height: 480px; }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #b8821e 0%, #c8952a 50%, #e8b84b 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: opacity 0.15s, transform 0.15s;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 14px rgba(200,149,42,0.35);
            font-family: inherit;
        }

        .btn-generate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .output-label {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 0.3px;
        }

        .btn-copy {
            padding: 6px 18px;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(200,149,42,0.25);
            border-radius: 20px;
            font-size: 13px;
            color: #5a4a2a;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-copy:hover { border-color: #c8952a; color: #c8952a; }

        .btn-copy.copied {
            background: #f0faf0;
            border-color: #7ec87e;
            color: #3a8a3a;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

</style>

<body>
<div class="jjd-topbar"><div class="jjd-topbar-logo">✦</div><span class="jjd-topbar-name">金钱剪刀</span><a class="jjd-topbar-back" href="edit.html">← 回到剪辑台</a></div>
    <div class="container">
        <div class="header">
            <h1>Show Notes 助手</h1>
            <p>粘贴逐字稿，一键生成标题 + Show Notes</p>
        </div>

        <div class="field" style="margin-bottom:16px">
            <textarea id="input" placeholder="请粘贴剪辑需求和带时间戳的逐字稿"></textarea>
        </div>

        <button class="btn-generate" id="generateBtn" onclick="generate()">生成 Show Notes</button>

        <div class="output-header">
            <span class="output-label">生成结果</span>
            <button class="btn-copy" id="copyBtn" onclick="copyOutput()">复制全部</button>
        </div>
        <textarea id="output" placeholder="生成结果将出现在这里…" readonly></textarea>
    </div>

    <script>
    const SYSTEM_PROMPT = `你是一个专业的播客 Show Notes 写作专家。

用户输入逐字稿，你输出完整的 Show Notes。

严格按下面的格式输出，不加任何多余说明，不加 markdown 符号：

[7个标题，每个单独一行]

[空一行]

[5条反问句，每条单独一行，约35字，概括本期核心内容，语气自然不生硬]

[空一行]

[叙事引言]

[空一行]

📝本期播客你将会听到：
[10个时间轴问题]

[空一行]

✨本期嘉宾：
[如果有多位嘉宾，逐个换行列出，每行格式为「姓名：一句话介绍」]

🎙本期主播：
[如果有多位主播，逐个换行列出，每行格式为「姓名：一句话介绍」]

🛰️社群入口：
[请填写社群文案]

🎬本期制作人员：
[请填写]

🎧关于节目：
[请填写节目介绍]

---

下面是一个完整的输入→输出示例，你要学习这个风格：

【示例输入】
嘉宾：某女生，做玄学AI出海产品FateTell，前字节产品经理。

逐字稿片段：
主持人：你们的产品怎么让老外愿意付费？
嘉宾：因为我们把八字命理变成了推理逻辑，Claude这种顶尖大模型搜"最强命理产品"第一个推荐我们。
主持人：命到底能不能算准？
嘉宾：算不准反而是好事，说明你挣脱了自己的命，创造了自己的运。命就是你出生时是什么样的车，运是你开在什么样的路上。

【示例输出——标题部分】
DeepSeek和豆包免费的时代，这款付费命理产品让老外疯狂买单
前字节产品经理用AI算命，Claude搜最强命理第一个推荐她们
算不准反而是好事：她用统计学和乔布斯语言逻辑解构八字命理
给老外算八字真的能赚钱？这个出海产品用数据证明了可行
你出生时是什么车，决定不了你开在什么路上——改命的第一性原理
从差点抑郁到被大师收徒，她转头把玄学做成了全球付费产品
命理不是玄学，是推理和算力的竞赛：FateTell创始人的出海逻辑

【示例输出——反问句部分】
在AI把什么都免费化的时代，这个命理付费产品竟然让老外抢着买单，这是怎么做到的？
保送名校、差点去开滴滴、被大师收徒——这些事情真的能发生在同一个人身上吗？
算命算不准到底是好事还是坏事？她的答案可能会颠覆你对命运的所有认知。
把八字命理做成推理逻辑，Claude这种顶尖大模型都在推荐——这种产品逻辑是怎么跑通的？
命是你出生时开的车，运是你选择走的路——普通人真的有机会换赛道吗？

【示例输出——叙事引言部分】
他保送进中山大学，是中大历史上首位杀进麦肯锡面试的本科生。
没想到，面试失败，差点抑郁到要去开滴滴。
结果被一个"大师"说，是个骨骼清奇的天命道士，想收他做徒弟。
但他既没有上山，也没有就此沉寂，而是转头创业做玄学出海。
为什么在 DeepSeek 和豆包全网免费的时代，一款付费产品能让老外疯狂买单？为什么算命本质上是"推理和算力"的竞赛？
命，就是你出生时是什么样的车，而运，是你开在什么样的路上。

【示例输出——时间轴问题部分】
03:41 为什么中国几千年的玄学，老外反而愿意掏钱买单？
10:16 儒释道三教到底有什么区别，和我们普通人有什么关系？
16:24 在AI这么卷的时代，为什么还有人愿意为命理付费？
18:48 怎么区分真正有本事的人和只会说漂亮话的骗子？
35:28 算命算不准是坏事还是好事？答案出乎意料
37:28 人生的苦和挫折到底有没有意义？
49:07 什么样的人生才算"好命"，普通人能不能拥有？
55:45 八字能不能用来做人生的重要决策？怎么用？
59:08 越算命越没运气是真的吗？
01:00:32 这个产品适合什么样的人玩，普通人能用吗？

---

学习以上示例后，对用户提供的逐字稿生成同等质量的 Show Notes。

多嘉宾节目规则：
- 如果逐字稿里有2位及以上嘉宾，必须识别并全部列出，不能只保留最突出的一位
- 标题、反问句、叙事引言、时间轴问题要覆盖多人对谈的核心信息，不能错误写成单嘉宾独白
- ✨本期嘉宾必须逐个换行列出所有嘉宾，不得遗漏
- 如果逐字稿里有多位主播，🎙本期主播也必须逐个换行列出

标题要求：
- 26–31个字，注意嘉宾性别；多位嘉宾时避免把不存在的单一主角写成全篇唯一焦点
- 结尾必须是具体结果/数字/动作/金句，不能是"她是怎么做到的""如何找到方向"这类空话
- 7个标题覆盖不同角度：反差、结果、悬念、代入感、破认知、用户获得、金句

时间轴问题要求：
- 用听众的视角写，问的是"我想知道的"，不是"她做了什么"
- 每条问题读给没听过这期的陌生人，他们会不会觉得"这个我也想知道"
`;

        async function callSafeAI(messages, { maxTokens = 4096 } = {}) {
          const res = await fetch('/api/deepseek/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              max_tokens: maxTokens,
              response_format: { type: 'json_object' },
              messages: [
                ...messages,
                { role: 'system', content: '只输出 JSON，格式必须是 {"result":"完整中文结果"}。result 里可以有换行，但不要输出代码块。' }
              ]
            })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || data.error || 'AI 服务繁忙，请稍后重试');
          const content = data?.choices?.[0]?.message?.content || '';
          try {
            const parsed = JSON.parse(content);
            return parsed.result || content;
          } catch (_) {
            return content;
          }
        }

        async function generate() {
            const input = document.getElementById('input').value.trim();
            if (!input)  { alert('请粘贴逐字稿内容'); return; }
            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>正在生成 Show Notes…';
            output.value = '';
            try {
                const result = await callSafeAI([
                    { role: 'system', content: SYSTEM_PROMPT },
                    { role: 'user', content: input }
                ], { maxTokens: 6000 });
                output.value = result || '没有生成结果，请重试。';
            } catch (e) {
                output.value = '⚠️ 错误：' + (e.message || e);
            } finally {
                btn.disabled = false;
                btn.textContent = '生成 Show Notes';
            }
        }

        function copyOutput() {
            const text = document.getElementById('output').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '复制全部';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
