<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金钱剪刀 💰✂️ · 审稿</title>
<style>
:root {
  /* jianji 同款 Apple 风 */
  --bg: #fafafa;
  --surface: #ffffff;
  --surface-2: #f5f5f7;
  --hairline: #e5e5ea;
  --hairline-strong: #d2d2d7;
  --ink: #1d1d1f;
  --ink-2: #424245;
  --muted: #86868b;
  --light: #a1a1a6;
  --placeholder: #c7c7cc;
  --accent: #F5A623;
  --accent-hover: #e6991a;
  --accent-soft: rgba(245,166,35,0.10);
  --accent-deep: #c47d0e;
  --danger: #ff3b30;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-accent: 0 2px 8px rgba(245,166,35,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
  line-height: 1.7;
}

.serif { font-family: inherit; }
.mono { font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace; }

/* ===== TOP BAR ===== */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:1000;
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.topbar .brand {
  font-size: 17px; font-weight: 700; color: var(--ink);
  letter-spacing: -0.2px;
}
.topbar .proj { font-size: 13px; color: var(--muted); }
.topbar .fill { flex:1; }
.topbar .status {
  font-size: 12px; color: var(--muted);
  font-family: "SF Mono", monospace;
}
.topbar .expbtn {
  background: var(--accent); color: #fff; border: none;
  padding: 9px 20px; font-size: 14px; font-weight: 600;
  letter-spacing: 0.2px; cursor: pointer;
  border-radius: 10px;
  box-shadow: var(--shadow-accent);
  transition: all .15s;
}
.topbar .expbtn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(245,166,35,0.4); }

/* ===== LAYOUT ===== */
.layout {
  display: flex;
  margin-top: 56px;
  margin-bottom: 80px;
}

/* --- SIDEBAR --- */
.sidebar {
  width: 320px; flex-shrink:0;
  background: var(--surface);
  border-right: 1px solid var(--hairline);
  position: sticky; top: 56px;
  height: calc(100vh - 136px);
  overflow-y: auto;
  padding: 28px 24px;
  display: flex; flex-direction: column; gap: 28px;
}

.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}

/* Duration */
.dur-block { padding-bottom: 24px; border-bottom: 1px solid var(--hairline); }
.dur-main {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px;
}
.dur-from {
  font-size: 20px; font-weight: 500;
  color: var(--light); text-decoration: line-through;
  text-decoration-color: var(--hairline-strong);
  font-variant-numeric: tabular-nums;
}
.dur-arrow { font-size: 16px; color: var(--hairline-strong); }
.dur-to {
  font-size: 34px; font-weight: 700; color: var(--ink);
  line-height: 1.1; letter-spacing: -0.5px;
  font-variant-numeric: tabular-nums;
}
.dur-meta { font-size: 13px; color: var(--muted); }
.dur-meta strong { font-weight: 600; color: var(--accent); }

/* Summary */
.summary-text {
  font-size: 14px; line-height: 1.7; color: var(--ink-2);
  background: var(--surface-2);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--accent);
}

/* Speakers */
.sp-legend { display:flex; flex-direction:column; gap: 10px; }
.sp-row { display:flex; align-items:center; gap: 10px; }
.sp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink:0; }
.sp-name { font-size: 14px; font-weight: 600; color: var(--ink); flex:1; }
.sp-val { font-family: "SF Mono", monospace; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* Navigator */
.nav-section { flex:1; min-height:0; display:flex; flex-direction:column; }
.nav-list { display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; }

.nav-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; transition: all .12s;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-soft); }

.nav-num {
  font-family: "SF Mono", monospace;
  font-size: 11px; color: var(--muted);
  min-width: 20px; padding-top: 3px;
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-num { color: var(--accent-deep); font-weight: 600; }

.nav-body { flex:1; }
.nav-title {
  font-size: 14px; font-weight: 600; color: var(--ink);
  line-height: 1.4; margin-bottom: 2px;
}
.nav-item.active .nav-title { color: var(--accent-deep); }

.nav-ts {
  font-family: "SF Mono", monospace;
  font-size: 11px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* --- MAIN --- */
.main { flex:1; min-width:0; padding: 32px 48px; max-width: 920px; }

.main-hdr {
  position: sticky; top: 56px; z-index: 99;
  background: var(--bg);
  padding: 20px 0 0;
  margin: -20px 0 0;
  border-bottom: 1px solid var(--hairline);
}

.main-title {
  font-size: 34px; font-weight: 700; color: var(--ink);
  line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.6px;
}

.main-sub {
  font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 20px;
}

/* Mode toggle */
.mode-bar {
  display: flex; align-items: center; gap: 16px;
  padding-bottom: 16px;
}
.mode-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; overflow: hidden;
  padding: 4px; position: relative;
  box-shadow: var(--shadow-card);
}
.mode-btn {
  padding: 10px 22px; font-size: 14px; font-weight: 600;
  color: var(--muted); cursor: pointer; border: none; background: none;
  transition: color .15s; border-radius: 8px;
  font-family: inherit;
  position: relative; z-index: 1;
}
.mode-btn.active { color: #fff; }
.mode-btn:hover:not(.active) { color: var(--ink); }

.mode-slider {
  position: absolute;
  top: 4px; left: 4px;
  height: calc(100% - 8px);
  border-radius: 8px;
  background: var(--ink);
  transition: transform .25s cubic-bezier(.4, 0, .2, 1), width .25s cubic-bezier(.4, 0, .2, 1);
  z-index: 0;
}

/* Audio refine bar */
.refine-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.refine-option {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 30px;
  padding: 6px 10px;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  user-select: none;
  transition: all .15s;
}
.refine-option:hover {
  border-color: var(--hairline-strong);
  color: var(--ink);
}
.refine-option input {
  accent-color: var(--accent);
}

/* Preview mode: smooth transitions */
.row.del, .blk, .sug-reason {
  transition: opacity .3s ease, max-height .3s ease, padding .3s ease, margin .3s ease;
  overflow: hidden;
}
body.preview .row.del {
  opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0;
  pointer-events: none;
}
body.preview .blk {
  opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0;
  pointer-events: none;
}
body.preview .sug-reason { opacity: 0; }

.hint-tag {
  display: inline-block; background: var(--surface-2); color: var(--ink-2);
  padding: 2px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--hairline);
}

/* Chapter header */
.chap-hdr {
  display: flex; align-items: baseline; gap: 12px;
  padding: 18px 4px 10px; margin: 28px 0 8px;
  border-bottom: 1px solid var(--hairline);
}
.chap-num {
  font-family: "SF Mono", monospace;
  font-size: 12px; color: var(--light); min-width: 24px;
  font-variant-numeric: tabular-nums;
}
.chap-title {
  font-size: 18px; font-weight: 700; color: var(--ink);
  letter-spacing: -0.2px;
}
.chap-desc {
  font-size: 12px; color: var(--muted); margin-left: auto;
}

/* Block (deleted section header) */
.blk {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; margin: 20px 0 6px;
  background: var(--accent-soft);
  border: 1px solid rgba(245,166,35,0.18);
  border-radius: 10px;
}
.blk-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--accent-deep);
  background: rgba(255,255,255,0.7);
  padding: 3px 8px; border-radius: 6px;
}
.blk-rsn { color: var(--ink-2); font-size: 14px; flex:1; }
.blk-dur { font-family: "SF Mono", monospace; font-size: 12px; color: var(--accent-deep); font-weight: 600; font-variant-numeric: tabular-nums; }

/* Checkbox */
.chk {
  width: 20px; height: 20px; border: 1.5px solid var(--hairline-strong); border-radius: 6px;
  cursor: pointer; display:flex; align-items:center; justify-content:center;
  font-size: 12px; color: transparent; transition: all .12s; flex-shrink:0;
  background: var(--surface);
}
.chk:hover { border-color: var(--accent); }
.chk.on { border-color: var(--accent); background: var(--accent); color: #fff; }

/* Sentence row */
.row {
  display: flex; align-items: flex-start;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 1px;
  cursor: pointer; transition: background .1s;
  border-left: 3px solid transparent;
}
.row:hover { background: var(--surface-2); }
.row.act { background: var(--accent-soft); border-left-color: var(--accent); }
.row.del { opacity: .5; }
.row.del:hover { opacity: .75; }
.row.del .r-txt { text-decoration: line-through; text-decoration-color: var(--muted); color: var(--muted); }
.row.sug { border-left: 3px dashed var(--accent); }
.row.sug .r-txt { text-decoration-style: dashed; }
.sug-reason {
  display: inline-block; margin-left: 8px;
  font-size: 11px; color: var(--accent-deep); font-weight: 600;
  background: var(--accent-soft); padding: 2px 8px; border-radius: 6px;
  vertical-align: middle;
  border: 1px solid rgba(245,166,35,0.18);
}

.r-chk { margin-right: 12px; padding-top: 3px; }
.r-sp { font-size: 14px; font-weight: 700; min-width: 56px; flex-shrink:0; margin-right: 12px; padding-top: 4px; color: var(--ink-2); }
.r-tm { font-family:"SF Mono",monospace; font-size: 13px; color: var(--light); min-width: 50px; flex-shrink:0; margin-right: 14px; padding-top: 5px; cursor:pointer; font-variant-numeric: tabular-nums; }
.r-tm:hover { color: var(--accent); }
.r-txt { font-size: 16px; line-height: 1.8; color: var(--ink); flex:1; min-width:0; }
.r-num { font-family:"SF Mono",monospace; font-size: 11px; color: var(--light); min-width: 32px; flex-shrink:0; margin-right: 8px; padding-top: 6px; text-align:right; user-select:none; font-variant-numeric: tabular-nums; }

/* Half-sentence deletion */
.r-txt .pd {
  text-decoration: line-through; text-decoration-color: var(--muted);
  color: var(--muted); background: var(--accent-soft);
  cursor: pointer; border-radius: 3px;
  padding: 0 2px;
}

/* Selection float button */
#selbtn {
  position: fixed; z-index: 9999; display:none;
  background: var(--ink); color:#fff;
  font-size: 13px; font-weight:600;
  padding: 8px 14px; border-radius: 8px;
  cursor:pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
  user-select:none;
  font-family: inherit;
}
#selbtn:hover { background: var(--accent); }

/* ===== PLAYER ===== */
.player {
  position: fixed; bottom:0; left:0; right:0; z-index:1000;
  background: var(--surface);
  border-top: 1px solid var(--hairline);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
  height: 80px;
  display: flex; align-items: center; padding: 0 28px; gap: 20px;
}

.p-time {
  font-family: "SF Mono", monospace;
  font-size: 14px; color: var(--ink); min-width: 56px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.p-total {
  font-family: "SF Mono", monospace;
  font-size: 14px; color: var(--muted); min-width: 56px;
  font-variant-numeric: tabular-nums;
}

.p-track { flex:1; height: 6px; background: var(--hairline); cursor:pointer; position:relative; border-radius:3px; }
.p-fill { height:100%; background: var(--accent); width:0%; transition:width .05s; border-radius:3px; position:relative; }
.p-leaf {
  position:absolute; right:-7px; top:-5px;
  width:16px; height:16px;
  background: #fff; border-radius: 50%;
  transition: right .05s;
  box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,0.15);
}
.p-track:active .p-fill { transition:none; }
.p-track:active .p-leaf { transition:none; }

.p-btn {
  background: var(--accent); color: #fff;
  border: none;
  padding: 10px 22px; font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; cursor: pointer; transition: all .15s;
  border-radius: 10px;
  box-shadow: var(--shadow-accent);
  font-family: inherit;
}
.p-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(245,166,35,0.4); }

.p-spd {
  font-family: "SF Mono", monospace;
  font-size: 13px; color: var(--ink-2); background: var(--surface-2);
  border: 1px solid var(--hairline); cursor: pointer;
  padding: 6px 12px; border-radius: 8px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  transition: all .15s;
}
.p-spd:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

/* Info icon */
.info-icon {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--hairline-strong); color: var(--muted);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all .12s;
}
.info-icon:hover { border-color: var(--accent); color: var(--accent); }

/* Info popup */
.info-popup {
  position: fixed; top: 64px; right: 20px; z-index: 2001;
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; padding: 20px; width: 340px;
  box-shadow: var(--shadow-md);
  font-size: 14px; line-height: 1.7; color: var(--ink-2);
  display: none;
}
.info-popup.vis { display: block; }
.info-popup-title { font-weight: 700; font-size: 15px; margin-bottom: 10px; color: var(--ink); }
.info-popup p { margin-bottom: 8px; }
.info-close {
  margin-top: 8px; padding: 8px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: inherit;
}
.info-close:hover { background: var(--accent-hover); }

/* Export success modal */
.export-modal {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,.4); display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.export-modal.vis { display: flex; }
.export-modal-inner {
  background: var(--surface); border-radius: 16px; padding: 32px;
  max-width: 460px; width: 90%;
  box-shadow: var(--shadow-md);
}
.export-modal-title {
  font-size: 22px; font-weight: 700; margin-bottom: 20px;
  color: var(--ink); letter-spacing: -0.3px;
}
.export-modal-steps { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.export-step {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 14px; line-height: 1.6; color: var(--ink-2);
}
.export-step em {
  color: var(--accent-deep); font-style: normal; font-weight: 600;
  background: var(--accent-soft); padding: 1px 6px; border-radius: 4px;
}
.export-step-num {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent-deep);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; margin-top: 1px;
}
.export-modal-btn {
  width: 100%; padding: 13px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit;
  box-shadow: var(--shadow-accent);
  transition: all .15s;
}
.export-modal-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(245,166,35,0.4); }

.toast {
  position:fixed; top:72px; right:24px;
  background: var(--ink); color:#fff;
  padding:12px 20px; font-size:14px; font-weight:600;
  z-index:2000;
  opacity:0; transition:opacity .3s; pointer-events:none;
  border-radius: 10px;
  box-shadow: var(--shadow-md);
}
.toast.vis { opacity:1; }

@media(max-width:960px) {
  .layout { flex-direction:column; }
  .sidebar { width:100%; position:relative; height:auto; border-right:none; border-bottom:1px solid var(--hairline); }
  .main { padding: 24px; }
  .main-title { font-size:26px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">金钱剪刀 💰✂️</span>
  <span class="proj">测试剪辑审查稿 (3人对话)</span>
  <span class="fill"></span>
  <span class="status" id="sv">自动保存：已保存</span>
  <span class="info-icon" onclick="document.getElementById('info-tip').classList.toggle('vis')" title="关于导出">?</span>
  <button class="expbtn" onclick="doExport()">导出</button>
</div>

<!-- Info tooltip -->
<div class="info-popup" id="info-tip">
  <div class="info-popup-title">导出说明</div>
  <p>导出会把所有标记删除的时间段传给浏览器剪辑页。</p>
  <p>下一页会在本机浏览器里加载 ffmpeg.wasm，生成可下载的 MP3 成品。</p>
  <button class="info-close" onclick="document.getElementById('info-tip').classList.remove('vis')">明白了</button>
</div>

<!-- Export success modal -->
<div class="export-modal" id="export-modal">
  <div class="export-modal-inner">
    <div class="export-modal-title">导出成功</div>
    <div class="export-modal-steps">
      <div class="export-step">
        <span class="export-step-num">1</span>
        <span>打开 Claude Code，将下载的 <strong>delete_segments_edited.json</strong> 拖入对话框</span>
      </div>
      <div class="export-step">
        <span class="export-step-num">2</span>
        <span>输入：<em>「用这个文件剪辑音频」</em></span>
      </div>
      <div class="export-step">
        <span class="export-step-num">3</span>
        <span>Claude 会执行剪辑，然后可以继续精剪口癖词、音质处理、加片头音乐等</span>
      </div>
    </div>
    <button class="export-modal-btn" onclick="document.getElementById('export-modal').classList.remove('vis')">好的</button>
  </div>
</div>

<div class="layout">
<aside class="sidebar">

  <div class="dur-block">
    <div class="section-label">时长</div>
    <div class="dur-main">
      <span class="dur-from serif" id="d-from">0:00</span>
      <span class="dur-arrow">→</span>
      <span class="dur-to serif" id="d-to">0:00</span>
    </div>
    <div class="dur-meta">删减了 <strong id="d-rm">0:00</strong></div>
  </div>

  <div>
    <div class="section-label">删减概要</div>
    <div class="summary-text" id="summ"></div>
  </div>

  <div>
    <div class="section-label">说话人</div>
    <div class="sp-legend" id="spleg"></div>
  </div>

  <div class="nav-section">
    <div class="section-label">章节导航</div>
    <div class="nav-list" id="nav"></div>
  </div>


</aside>

<main class="main">
  <div class="main-hdr">
    <div class="mode-bar">
      <div class="mode-toggle" id="mode-toggle">
        <div class="mode-slider" id="mode-slider"></div>
        <button class="mode-btn active" id="mode-edit" onclick="setMode('edit')">✂️ 剪辑模式</button>
        <button class="mode-btn" id="mode-preview" onclick="setMode('preview')">🎧 粗剪试听</button>
      </div>
      <div class="refine-bar" id="refine-bar" aria-label="音频精修设置">
        <label class="refine-option">
          <input type="checkbox" id="refine-normalize">
          <span>响度统一</span>
        </label>

const DEFAULT_REFINE_SETTINGS = {
  normalizeLoudness: true,
  denoise: false,
  voiceEnhance: false,
  targetLufs: -16
};
let refineSettings = loadRefineSettings();

function fm(s){ if(s<0)s=0; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60); return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`; }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function loadRefineSettings(){
  try {
    const raw = sessionStorage.getItem(REFINE_SETTINGS_KEY) || localStorage.getItem(REFINE_SETTINGS_KEY);
    if (!raw) return {...DEFAULT_REFINE_SETTINGS};
    const parsed = JSON.parse(raw);
    return {
      ...DEFAULT_REFINE_SETTINGS,
      normalizeLoudness: Boolean(parsed.normalizeLoudness),
      denoise: Boolean(parsed.denoise),
      voiceEnhance: Boolean(parsed.voiceEnhance),
      targetLufs: -16
    };
  } catch(e) {
    return {...DEFAULT_REFINE_SETTINGS};
  }
}

function saveRefineSettings(){
  try {
    const serialized = JSON.stringify(refineSettings);
    sessionStorage.setItem(REFINE_SETTINGS_KEY, serialized);
    localStorage.setItem(REFINE_SETTINGS_KEY, serialized);
  } catch(e) {}
}

function initRefineBar(){
  const normalize = document.getElementById('refine-normalize');
  const denoise = document.getElementById('refine-denoise');
  const voice = document.getElementById('refine-voice');
  if (!normalize || !denoise || !voice) return;

  normalize.checked = refineSettings.normalizeLoudness;
  denoise.checked = refineSettings.denoise;
  voice.checked = refineSettings.voiceEnhance;

  normalize.addEventListener('change', () => {
    refineSettings.normalizeLoudness = normalize.checked;
    saveRefineSettings();
  });
  denoise.addEventListener('change', () => {
    refineSettings.denoise = denoise.checked;
    saveRefineSettings();
  });
  voice.addEventListener('change', () => {
    refineSettings.voiceEnhance = voice.checked;
    saveRefineSettings();
  });

  saveRefineSettings();
}

// 半句删除：字符级渲染。pdel 段用 [cs,ce) 字符区间标记，落在区间内的字符串划线。
// 字符级（而非整词）才能显示"词内部分删除"，与导出的插值时间一致。
function txtHtml(x){
  if(!x.w || !x.w.length) return esc(x.t);  // 兼容无逐词时间的旧数据
  const full = x.w.map(w=>w.t).join('');
  const ranges = pdel[x.idx] || [];
  let html='', i=0;
  while(i < full.length){
    const ri = ranges.findIndex(r => i >= r.cs && i < r.ce);
    if(ri >= 0){
      html += `<span class="pd" data-ri="${ri}">${esc(full.slice(i, ranges[ri].ce))}</span>`;
      i = ranges[ri].ce;
    } else {
      const starts = ranges.filter(r => r.cs > i).map(r => r.cs);
      const nx = starts.length ? Math.min(...starts) : full.length;
      html += esc(full.slice(i, nx));
      i = nx;
    }
  }
  return html;
}

// ===== STATS =====
function computeStats() {
  const td=S.length?S[S.length-1].e:0; let rd=0; const rbt={}, sd={};
  S.forEach(x=>{const d=x.e-x.s;if(del.has(x.idx)){rd+=d;rbt[x.dt||'other']=(rbt[x.dt||'other']||0)+d}else if(x.sp){sd[x.sp]=(sd[x.sp]||0)+d}});
  // 半句删除（仅对未整句删除的句子生效）
  for(const k in pdel){ const idx=+k; if(del.has(idx))continue; const x=S.find(s=>s.idx===idx); pdel[k].forEach(r=>{const d=r.e-r.s; rd+=d; rbt.partial=(rbt.partial||0)+d; if(x&&x.sp&&sd[x.sp])sd[x.sp]=Math.max(0,sd[x.sp]-d);}); }
  return {td, rd, rc:td-rd, rbt, sd};
}

// ===== SIDEBAR =====
function renderSidebar() {
  const {td, rd, rc, rbt, sd} = computeStats();

  document.getElementById('d-from').textContent=fm(td);
  document.getElementById('d-to').textContent=fm(rc);
  document.getElementById('d-rm').textContent=fm(rd);

  // Summary
  const fill=['pre_show','tech_debug','production_talk','chit_chat'];
  let fd=0;const fn=[];const cc=[];
  for(const[t,d] of Object.entries(rbt)){if(t==='other')continue;if(fill.includes(t)){fd+=d;fn.push(TL[t]||t)}else cc.push({l:TL[t]||t,d})}
  cc.sort((a,b)=>b.d-a.d);
  const pts=[];
  if(fd>0)pts.push(`${Math.round(fd/60)} 分钟${fn.join('、')}`);
  cc.forEach(c=>pts.push(`${Math.round(c.d/60)} 分钟${c.l}`));
  // Count suggested deletes
  const sugCount = S.filter(x => x.sug && del.has(x.idx)).length;
  let summText = '';
  if(pts.length) summText += `共删除 ${pts.join('，')}。`;
  if(sugCount > 0) summText += `另有 ${sugCount} 句建议精简（重复叙述/展开过多），可在右侧逐条恢复。`;
  if(!summText) summText = '未做任何删减。';
  document.getElementById('summ').textContent = summText;

  // Speaker legend (no pie chart)
  const en=spList.filter(sp=>sd[sp]>0).map(sp=>({n:sp,d:sd[sp]||0}));
  if(en.length){
    document.getElementById('spleg').innerHTML=en.map(e=>{
      const p=Math.round(e.d/rc*100);
      return`<div class="sp-row"><span class="sp-dot" style="background:${spCMap[e.n]}"></span><span class="sp-name">${e.n}</span><span class="sp-val">${p}% · ${fm(e.d)}</span></div>`;
    }).join('');
  }

  // Navigator
  document.getElementById('nav').innerHTML = CHAPS.map((ch,i)=>{
    return`<div class="nav-item${i===curNav?' active':''}" onclick="navTo(${i})">
      <span class="nav-num">${String(i+1).padStart(2,'0')}</span>

        <div class="nav-title">${esc(ch.title)}</div>
        <div class="nav-ts">${ch.time} · ${esc(ch.desc)}</div>
      </div>
    </div>`;

}

function renderTx() {
  const c=document.getElementById('tx');let h='';
  // Block map (deleted sections)
  const bm={};BLK.forEach(b=>{for(let i=b.r[0];i<=b.r[1];i++)bm[i]=b});
  // Chapter map (content sections)
  const cm={};CHAPS.forEach((ch,i)=>{if(ch.startIdx!==undefined)cm[ch.startIdx]={...ch,num:i+1}});

  let lb=null;
  S.forEach(x=>{
    // Chapter header — content section divider
    if(cm[x.idx]){
      const ch=cm[x.idx];
      h+=`<div class="chap-hdr" id="chap${ch.num}">
        <span class="chap-num">${String(ch.num).padStart(2,'0')}</span>
        <span class="chap-title">${esc(ch.title)}</span>
        <span class="chap-desc">${esc(ch.desc||'')}</span>
      </div>`;
    }

    // Block header — deleted section
    const b=bm[x.idx];
    if(b&&b!==lb){
      const ck=isBD(b);
      h+=`<div class="blk"><div class="chk ${ck?'on':''}" onclick="tgB(${b.id})">✕</div><span class="blk-tag">${TL[b.type]||b.type}</span><span class="blk-rsn">${b.reason}</span><span class="blk-dur mono">${b.dur}</span></div>`;
      lb=b;
    }

    // Sentence row
    const id=del.has(x.idx);
    const isSug = x.sug && id; // suggested + currently deleted
    let cl='row';if(id)cl+=' del';if(isSug)cl+=' sug';if(x.idx===curIdx)cl+=' act';
    const reasonTag = (isSug && x.sugReason) ? `<span class="sug-reason">${esc(x.sugReason)}</span>` : '';
    h+=`<div class="${cl}" id="r${x.idx}" onclick="goTo(${x.idx})"><div class="r-chk"><div class="chk ${id?'on':''}" onclick="event.stopPropagation();tgS(${x.idx})">✕</div></div><div class="r-num mono">${x.idx+1}</div><div class="r-sp">${x.sp}</div><div class="r-tm">${x.ts}</div><div class="r-txt">${txtHtml(x)}${reasonTag}</div></div>`;
  });
  c.innerHTML=h;
}

function isBD(b){for(let i=b.r[0];i<=b.r[1];i++)if(!del.has(i))return false;return true}

const selbtn=document.createElement('div');
selbtn.id='selbtn'; selbtn.textContent='✂ 删除选中';
selbtn.onmousedown=e=>e.preventDefault();   // 防止点按钮时清空选区
selbtn.onclick=delSel;
document.body.appendChild(selbtn);
function hideSelBtn(){ selbtn.style.display='none'; }
document.addEventListener('mousedown',e=>{ if(e.target!==selbtn) hideSelBtn(); });

document.getElementById('tx').addEventListener('mouseup',e=>{
  // 点到已划掉的词 → 恢复该段
  if(e.target.classList && e.target.classList.contains('pd')){
    const row=e.target.closest('.row'); if(!row) return;
    const idx=+row.id.slice(1), ri=+e.target.dataset.ri;
    if(pdel[idx]){ pdel[idx].splice(ri,1); if(!pdel[idx].length) delete pdel[idx]; }
    renderTx(); sv(); hideSelBtn(); return;
  }
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.toString().trim()){ hideSelBtn(); return; }
    const an=sel.anchorNode; const el=(an&&an.nodeType===1?an:an&&an.parentElement);
    const txt=el&&el.closest('.r-txt'); if(!txt){ hideSelBtn(); return; }
    const rect=sel.getRangeAt(0).getBoundingClientRect();
    selbtn.style.left=Math.max(8,rect.left+rect.width/2-44)+'px';
    selbtn.style.top=Math.max(8,rect.top-38)+'px';
    selbtn.style.display='block';
  },10);
});

function delSel(){
  const sel=window.getSelection(); if(!sel||sel.isCollapsed) return;
  const range=sel.getRangeAt(0);
  const an=sel.anchorNode; const el=(an&&an.nodeType===1?an:an&&an.parentElement);
  const txt=el&&el.closest('.r-txt'); if(!txt){ hideSelBtn(); return; }
  const idx=+txt.closest('.row').id.slice(1);
  const x=S.find(s=>s.idx===idx); if(!x||!x.w){ hideSelBtn(); return; }
  const selText=sel.toString(); if(!selText.trim()){ hideSelBtn(); return; }

  // 精确字符偏移：从 r-txt 起点到选区起点的文本长度（不依赖 indexOf，避免同字误匹配）
  const pre=document.createRange(); pre.setStart(txt,0); pre.setEnd(range.startContainer, range.startOffset);
  const pos=pre.toString().length;
  const wt=x.w.map(w=>w.t); const full=wt.join('');
  const delEnd=Math.min(pos+selText.length, full.length);
  if(pos<0 || delEnd<=pos){ hideSelBtn(); return; }

  // 字符区间 [pos,delEnd) → 词 + 词内偏移
  let cc=0, sW=null, eW=null, sOff=0, eOff=0;
  for(let i=0;i<wt.length;i++){
    const wS=cc, wE=cc+wt[i].length;
    if(sW===null && wE>pos){ sW=i; sOff=pos-wS; }
    if(wE>=delEnd){ eW=i; eOff=wE-delEnd; break; }
    cc=wE;
  }
  if(sW===null||eW===null){ hideSelBtn(); return; }
  const sw=x.w[sW], ew=x.w[eW];
  // 词内按字符比例插值时间（ASR 合词时也能切准）
  let st=(sOff>0 && wt[sW].length>0) ? sw.s+(sw.e-sw.s)*(sOff/wt[sW].length) : sw.s;
  let et=(eOff>0 && wt[eW].length>0) ? ew.e-(ew.e-ew.s)*(eOff/wt[eW].length) : ew.e;
  // 有条件边界扩展（仅当选区正好落在词边界时）：起点 gap<0.2s 前移，终点 gap<2s 延后，吃掉死气间隙
  if(sOff===0 && sW>0){ const pv=x.w[sW-1]; const g=st-pv.e; if(g>=0&&g<0.20) st=pv.e; }
  if(eOff===0 && eW<x.w.length-1){ const nx=x.w[eW+1]; const g=nx.s-et; if(g>=0&&g<2.0) et=nx.s; }

  (pdel[idx]=pdel[idx]||[]).push({cs:pos, ce:delEnd, s:Math.round(st*1000)/1000, e:Math.round(et*1000)/1000});
  um.add(idx);
  sel.removeAllRanges(); hideSelBtn(); renderTx(); sv();
}

// 收集所有半句删除时间段（跳过整句已删的句子，避免重复）
function pdelRanges(){
  const out=[];
  for(const k in pdel){ const idx=+k; if(del.has(idx)) continue; pdel[k].forEach(r=>out.push([r.s,r.e])); }
  return out;
}

function goTo(idx){

}

let previewMode = false;

function findVisibleSentenceIdx() {
  // Find the first non-deleted sentence currently visible in viewport
  const rows = document.querySelectorAll('.row:not(.del)');
  for (const row of rows) {
    const rect = row.getBoundingClientRect();
    if (rect.top >= 100 && rect.top < window.innerHeight * 0.6) {
      return parseInt(row.id.replace('r', ''));
    }
  }
  // Fallback: find closest to top
  for (const row of rows) {
    const rect = row.getBoundingClientRect();
    if (rect.bottom > 100) return parseInt(row.id.replace('r', ''));
  }
  return -1;
}

function positionSlider() {
  const toggle = document.getElementById('mode-toggle');
  const slider = document.getElementById('mode-slider');
  const activeBtn = previewMode ? document.getElementById('mode-preview') : document.getElementById('mode-edit');
  if (!slider || !activeBtn || !toggle) return;
  const tRect = toggle.getBoundingClientRect();
  const bRect = activeBtn.getBoundingClientRect();
  slider.style.width = bRect.width + 'px';
  slider.style.transform = `translateX(${bRect.left - tRect.left - 4}px)`;
}

function setMode(mode) {
  const wasPreview = previewMode;
  previewMode = (mode === 'preview');
  if (wasPreview === previewMode) return;

  const anchorIdx = findVisibleSentenceIdx();

  document.body.classList.toggle('preview', previewMode);
  document.getElementById('mode-edit').classList.toggle('active', !previewMode);
  document.getElementById('mode-preview').classList.toggle('active', previewMode);
  positionSlider();

  renderSidebar();
  if (typeof updatePlayerDuration === 'function') updatePlayerDuration();

  if (anchorIdx >= 0) {
    const row = document.getElementById('r' + anchorIdx);
    if (row) row.scrollIntoView({ block: 'start' });
  }
}

// Compute virtual time (rough cut position) from original time
function originalToVirtual(origTime) {
  let virtualTime = 0;
  let lastEnd = 0;
  // Sort kept segments
  const kept = [];
  let segStart = null;
  S.forEach(x => {
    if (!del.has(x.idx)) {
      if (segStart === null) segStart = x.s;
    } else {
      if (segStart !== null) {
        kept.push({ s: segStart, e: x.s });
        segStart = null;
      }
    }
  });
  if (segStart !== null) {
    const lastS = S[S.length - 1];
    kept.push({ s: segStart, e: lastS.e });
  }

  for (const seg of kept) {
    if (origTime <= seg.s) break;
    if (origTime >= seg.e) {
      virtualTime += seg.e - seg.s;
    } else {
      virtualTime += origTime - seg.s;
      break;
    }
  }
  return virtualTime;
}

// ===== EXPORT =====
function doExport(){
  // 收集所有删除时间段：整句删除 + 半句删除，排序后合并相邻（间隙<1.5s）
  let ranges=[];
  S.forEach(x=>{ if(del.has(x.idx)) ranges.push([x.s,x.e]); });
  ranges=ranges.concat(pdelRanges());
  ranges.sort((p,q)=>p[0]-q[0]);
  const segs=[];let c=null;
  ranges.forEach(r=>{ if(c&&(r[0]-c.end)<1.5){ if(r[1]>c.end)c.end=r[1]; } else { if(c)segs.push(c); c={start:r[0],end:r[1]}; } });
  if(c)segs.push(c);
  // Extend first segment to 0 to avoid opening artifacts
  if(segs.length>0 && segs[0].start<5) segs[0].start=0;

  const stats = computeStats();
  const data = {
    version: "roughcut_v1",
    exported_at: new Date().toISOString(),
    original_duration: Math.round(stats.td),
    roughcut_duration: Math.round(stats.rc),
    removed_duration: Math.round(stats.rd),
    segments: segs
  };

  const injected = (() => {
    try { return JSON.parse(sessionStorage.getItem('jinqian_data') || localStorage.getItem('jinqian_data') || '{}'); }
    catch (error) { return {}; }
  })();
  const cutPayload = {
    ...data,
    audioUrl: window.__AUDIO_OVERRIDE || document.getElementById('au').src,
    fileName: injected.fileName || window.__FILE_NAME || 'podcast.mp3',
    refineSettings: {...refineSettings}
  };
  const serializedCutPayload = JSON.stringify(cutPayload);
  sessionStorage.setItem('jinqian_cut_data', serializedCutPayload);
  try { localStorage.setItem('jinqian_cut_data', serializedCutPayload); } catch(e) {}
  location.href = 'cut.html';
}

function sv(){try{localStorage.setItem(SK,JSON.stringify({v:DATA_VER,d:Array.from(del),m:Array.from(um),p:pdel}))}catch(e){}}
function rs(){try{const r=localStorage.getItem(SK);if(!r)return;const s=JSON.parse(r);if(s.v!==DATA_VER)return;if(s.d){del.clear();s.d.forEach(i=>del.add(i))}if(s.m)s.m.forEach(i=>um.add(i));if(s.p){for(const k in pdel)delete pdel[k];Object.assign(pdel,s.p)}}catch(e){}}
function showT(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('vis');setTimeout(()=>el.classList.remove('vis'),2000)}

rs();renderAll();initRefineBar();
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();tgPlay()}});

</script>
