<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金钱剪刀 💰✂️ · 审稿</title>
<style>
:root {
  /* jianji 同款 Apple 风 */
  --bg: #fafafa;
  --surface: #ffffff;
  --surface-2: #f5f5f7;
  --hairline: #e5e5ea;
  --hairline-strong: #d2d2d7;
  --ink: #1d1d1f;
  --ink-2: #424245;
  --muted: #86868b;
  --light: #a1a1a6;
  --placeholder: #c7c7cc;
  --accent: #F5A623;
  --accent-hover: #e6991a;
  --accent-soft: rgba(245,166,35,0.10);
  --accent-deep: #c47d0e;
  --danger: #ff3b30;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-accent: 0 2px 8px rgba(245,166,35,0.3);
  --sidebar-w: 340px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
  line-height: 1.7;
}

.serif { font-family: inherit; }
.mono { font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace; }

/* ===== TOP BAR ===== */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:1000;
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.topbar .brand {
  font-size: 17px; font-weight: 700; color: var(--ink);
  letter-spacing: -0.2px;
}
.topbar .proj { font-size: 13px; color: var(--muted); }
.topbar .fill { flex:1; }
.topbar .status {
  font-size: 12px; color: var(--muted);
  font-family: "SF Mono", monospace;
}
.topbar .expbtn {
  background: var(--accent); color: #fff; border: none;
  padding: 9px 20px; font-size: 14px; font-weight: 600;
  letter-spacing: 0.2px; cursor: pointer;
  border-radius: 10px;
  box-shadow: var(--shadow-accent);
  transition: all .15s;
}
.topbar .expbtn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(245,166,35,0.4); }
.topbar .backupbtn {
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  color: var(--ink-2);
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 650;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
}
.topbar .backupbtn:hover {
  background: var(--surface);
  border-color: var(--accent);
  color: var(--accent-deep);
}
.topbar .snapshot-cutbtn {
  background: var(--accent-soft);
  border: 1px solid rgba(245,166,35,0.35);
  color: var(--accent-deep);
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 650;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
}
.topbar .snapshot-cutbtn:hover {
  background: var(--surface);
  border-color: var(--accent);
}
body.readonly .expbtn,
body.readonly .backupbtn,
body.readonly .gearbtn,
body.readonly .chk,
body.readonly #selbtn,
body.readonly .decision-edit,
body.readonly .decision-tools button:last-child {
  display: none !important;
}
body.readonly .row {
  cursor: pointer;
}
body.readonly .decision-status::after {
  content: " · 只读";
}

/* ===== LAYOUT ===== */
.layout {
  display: flex;
  margin-top: 56px;
  margin-bottom: 80px;
  align-items: flex-start;
}

/* --- SIDEBAR --- */
.sidebar {
  width: var(--sidebar-w); flex-shrink:0;
  background: var(--surface);
  position: sticky; top: 56px;
  height: calc(100vh - 136px);
  overflow-y: auto;
  padding: 28px 24px;
  display: flex; flex-direction: column; gap: 12px;
}

.splitter {
  width: 9px;
  flex-shrink: 0;
  align-self: stretch;
  min-height: calc(100vh - 136px);
  position: sticky;
  top: 56px;
  cursor: col-resize;
  background: linear-gradient(to right, transparent 0 3px, var(--hairline) 3px 4px, transparent 4px 100%);
  transition: background-color .12s;
  z-index: 80;
}

.splitter:hover,
body.resizing-sidebar .splitter {
  background-color: var(--accent-soft);
}

body.resizing-sidebar {
  cursor: col-resize;
  user-select: none;
}

.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}

/* Duration */
.dur-block { padding-bottom: 24px; border-bottom: 1px solid var(--hairline); }
.dur-main {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px;
}
.dur-from {
  font-size: 20px; font-weight: 500;
  color: var(--light); text-decoration: line-through;
  text-decoration-color: var(--hairline-strong);
  font-variant-numeric: tabular-nums;
}
.dur-arrow { font-size: 16px; color: var(--hairline-strong); }
.dur-to {
  font-size: 34px; font-weight: 700; color: var(--ink);
  line-height: 1.1; letter-spacing: -0.5px;
  font-variant-numeric: tabular-nums;
}
.dur-meta { font-size: 13px; color: var(--muted); }
.dur-meta strong { font-weight: 600; color: var(--accent); }

.side-fold {
  border: 1px solid var(--hairline);
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
}

.side-fold summary {
  list-style: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 11px;
  font-size: 13px;
  font-weight: 650;
  color: var(--ink);
}

.side-fold summary::-webkit-details-marker { display: none; }

.side-fold summary::before {
  content: "›";
  color: var(--accent-deep);
  transition: transform .12s;
}

.side-fold[open] summary::before {
  transform: rotate(90deg);
}

.side-fold-mini {
  margin-left: auto;
  font-family: "SF Mono", monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
}

.side-fold-body {
  border-top: 1px solid var(--hairline);
  padding: 12px;
}

.side-fold .dur-block {
  padding-bottom: 0;
  border-bottom: 0;
}

/* Summary */
.summary-text {
  font-size: 14px; line-height: 1.7; color: var(--ink-2);
  background: var(--surface-2);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--accent);
}

/* Speakers */
.sp-legend { display:flex; flex-direction:column; gap: 10px; }
.sp-row { display:flex; align-items:center; gap: 10px; }
.sp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink:0; }
.sp-name { font-size: 14px; font-weight: 600; color: var(--ink); flex:1; }
.sp-val { font-family: "SF Mono", monospace; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

/* Navigator */
.nav-section { flex:1; min-height:0; display:flex; flex-direction:column; }
.nav-list { display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; }

.side-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 14px;
}

.side-tab {
  border: 0;
  background: transparent;
  color: var(--muted);
  border-radius: 7px;
  padding: 7px 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .12s;
}

.side-tab.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-card);
}

.side-panel {
  min-height: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.side-panel.hidden { display: none; }

.decision-report,
.overview-content {
  overflow-y: auto;
  flex: 1;
  padding-right: 2px;
}

.decision-block {
  border: 1px solid var(--hairline);
  background: var(--surface);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}

.decision-block[open] {
  box-shadow: var(--shadow-card);
}

.decision-block summary {
  list-style: none;
  cursor: pointer;
  padding: 11px 12px;
  font-size: 14px;
  font-weight: 650;
  line-height: 1.4;
  color: var(--ink);
}

.decision-block summary::-webkit-details-marker { display: none; }

.decision-block summary::before {
  content: "›";
  display: inline-block;
  margin-right: 7px;
  color: var(--accent-deep);
  transition: transform .12s;
}

.decision-block[open] summary::before {
  transform: rotate(90deg);
}

.decision-content {
  border-top: 1px solid var(--hairline);
  padding: 10px 12px 12px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-2);
}

.decision-subhead {
  color: var(--accent-deep);
  font-size: 13px;
  font-weight: 800;
  margin: 12px 0 6px;
}
.decision-subhead:first-child { margin-top: 0; }
.decision-content p { margin: 0 0 8px; }
.decision-content p:last-child { margin-bottom: 0; }
.decision-content .decision-bullet { padding-left: 12px; position: relative; }
.decision-content .decision-bullet::before {
  content: "";
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  left: 0;
  top: 11px;
}

.decision-tools {
  align-items: center;
  border-top: 1px solid var(--hairline);
  display: flex;
  gap: 8px;
  justify-content: space-between;
  padding: 10px 12px 12px;
}

.decision-mini-btn {
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  color: var(--ink-2);
  cursor: pointer;
  font-size: 12px;
  font-weight: 650;
  min-height: 32px;
  padding: 0 10px;
}

.decision-mini-btn:hover {
  border-color: var(--accent);
  color: var(--accent-deep);
}

.decision-edit {
  border-top: 1px solid var(--hairline);
  display: none;
  gap: 10px;
  padding: 12px;
}

.decision-block.editing .decision-content {
  display: none;
}

.decision-block.editing .decision-edit {
  display: grid;
}

.decision-field {
  display: grid;
  gap: 6px;
}

.decision-field label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.decision-input,
.decision-select,
.decision-textarea {
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--ink);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  padding: 9px 10px;
  width: 100%;
}

.decision-textarea {
  line-height: 1.6;
  min-height: 118px;
  resize: vertical;
}

.decision-input:focus,
.decision-select:focus,
.decision-textarea:focus {
  background: var(--surface);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.decision-status {
  color: var(--muted);
  font-size: 12px;
}

.decision-empty {
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
  background: var(--surface-2);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  padding: 12px 14px;
}
.decision-empty strong {
  color: var(--ink);
  display: block;
  font-size: 13px;
  margin-bottom: 4px;
}
.decision-empty p {
  margin: 0;
}
.nav-decision-alert {
  margin-bottom: 10px;
}

.nav-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; transition: all .12s;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--accent-soft); }

.nav-num {
  font-family: "SF Mono", monospace;
  font-size: 11px; color: var(--muted);
  min-width: 20px; padding-top: 3px;
  font-variant-numeric: tabular-nums;
}
.nav-item.active .nav-num { color: var(--accent-deep); font-weight: 600; }

.nav-body { flex:1; }
.nav-title {
  font-size: 14px; font-weight: 600; color: var(--ink);
  line-height: 1.4; margin-bottom: 2px;
}
.nav-item.active .nav-title { color: var(--accent-deep); }

.nav-ts {
  font-family: "SF Mono", monospace;
  font-size: 11px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* --- MAIN --- */
.main { flex:1; min-width:0; padding: 32px 48px; max-width: 920px; }

.main-hdr {
  position: sticky; top: 56px; z-index: 99;
  background: var(--bg);
  padding: 20px 0 0;
  margin: -20px 0 0;
  border-bottom: 1px solid var(--hairline);
}

.main-title {
  font-size: 34px; font-weight: 700; color: var(--ink);
  line-height: 1.2; margin-bottom: 6px; letter-spacing: -0.6px;
}

.main-sub {
  font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 20px;
}

/* Mode toggle */
.mode-bar {
  display: flex; align-items: center; gap: 16px;
  padding-bottom: 16px;
}
.mode-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; overflow: hidden;
  padding: 4px; position: relative;
  box-shadow: var(--shadow-card);
}
.mode-btn {
  padding: 10px 22px; font-size: 14px; font-weight: 600;
  color: var(--muted); cursor: pointer; border: none; background: none;
  transition: color .15s; border-radius: 8px;
  font-family: inherit;
  position: relative; z-index: 1;
}
.mode-btn.active { color: #fff; }
.mode-btn:hover:not(.active) { color: var(--ink); }

.mode-slider {
  position: absolute;
  top: 4px; left: 4px;
  height: calc(100% - 8px);
  border-radius: 8px;
  background: var(--ink);
  transition: transform .25s cubic-bezier(.4, 0, .2, 1), width .25s cubic-bezier(.4, 0, .2, 1);
  z-index: 0;
}

/* Audio refine bar (kept for gear popup) */
.refine-option {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  padding: 6px 8px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  user-select: none;
  transition: all .15s;
}
.refine-option:hover {
  background: var(--surface-2);
  color: var(--ink);
}
.refine-option input {
  accent-color: var(--accent);
}

/* Gear button */
.gearbtn {
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  color: var(--muted);
  padding: 8px 12px;
  font-size: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  line-height: 1;
}
.gearbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface); }

/* Gear popup */
.gear-popup {
  position: fixed; top: 64px; right: 16px; z-index: 2001;
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; padding: 10px 12px; min-width: 160px;
  box-shadow: var(--shadow-md);
  display: none;
}
.gear-popup.vis { display: block; }
.gear-popup-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 6px; padding: 0 4px;
}

/* Duration + speaker info bar in mode-bar */
.dur-info-bar {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-2);
}
.dur-info-time {
  font-family: "SF Mono", monospace;
  font-size: 13px; font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.dur-info-sep { color: var(--hairline-strong); font-size: 12px; }
.sp-chip {
  display: inline-flex; align-items: center; gap: 4px;
  cursor: pointer; padding: 3px 7px; border-radius: 6px;
  border: 1px solid transparent;
  transition: all .12s;
  user-select: none;
}
.sp-chip:hover { border-color: var(--hairline); background: var(--surface-2); }
.sp-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sp-chip-name { font-size: 12px; font-weight: 600; color: var(--ink); }
.sp-chip-pct { font-size: 11px; color: var(--muted); }
.sp-rename-input {
  font-size: 12px; font-weight: 600; color: var(--ink);
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 4px; outline: none; padding: 2px 5px;
  width: 80px; font-family: inherit;
  box-shadow: 0 0 0 2px var(--accent-soft);
}

/* Unified nav + act items in sidebar */
.nav-act-item {
  border: 1px solid var(--hairline);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 4px;
  background: var(--surface);
  transition: border-color .12s;
}
.nav-act-item.active { border-color: rgba(245,166,35,.4); background: var(--accent-soft); }
.nav-act-item > summary {
  list-style: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 11px;
  font-size: 13px; font-weight: 650; color: var(--ink);
}
.nav-act-item > summary::-webkit-details-marker { display: none; }
.nav-act-item > summary::before {
  content: "›";
  color: var(--accent-deep);
  transition: transform .12s;
  flex-shrink: 0;
}
.nav-act-item[open] > summary::before { transform: rotate(90deg); }
.nav-act-item > summary:hover { background: var(--surface-2); }
.nav-act-item.active > summary { color: var(--accent-deep); }
.nav-act-item.active > summary::before { color: var(--accent-deep); }
.nav-act-content {
  border-top: 1px solid var(--hairline);
  padding: 10px 12px 12px;
  font-size: 12px;
  line-height: 1.65;
  color: var(--ink-2);
}
.nav-act-content p { margin: 0 0 6px; }
.nav-act-content p:last-child { margin-bottom: 0; }
.nav-act-content .decision-bullet { padding-left: 12px; position: relative; }
.nav-act-content .decision-bullet::before {
  content: "";
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent);
  position: absolute; left: 0; top: 9px;
}
.dec-badge {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: .3px;
  padding: 1px 6px; border-radius: 4px; margin-left: 6px;
  vertical-align: middle;
}
.dec-badge-保留 { background: rgba(52,199,89,.12); color: #1a7f37; }
.dec-badge-删除 { background: rgba(255,59,48,.1); color: #c0392b; }
.dec-badge-压缩 { background: var(--accent-soft); color: var(--accent-deep); }

/* Preview mode: smooth transitions */
.row.del, .blk, .sug-reason {
  transition: opacity .3s ease, max-height .3s ease, padding .3s ease, margin .3s ease;
  overflow: hidden;
}
body.preview .row.del {
  opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0;
  pointer-events: none;
}
body.preview .blk {
  opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0;
  pointer-events: none;
}
body.preview .sug-reason { opacity: 0; }

.hint-tag {
  display: inline-block; background: var(--surface-2); color: var(--ink-2);
  padding: 2px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--hairline);
}

/* Chapter header */
.chap-hdr {
  display: flex; align-items: baseline; gap: 12px;
  padding: 18px 4px 10px; margin: 28px 0 8px;
  border-bottom: 1px solid var(--hairline);
}
.chap-num {
  font-family: "SF Mono", monospace;
  font-size: 12px; color: var(--light); min-width: 24px;
  font-variant-numeric: tabular-nums;
}
.chap-title {
  font-size: 18px; font-weight: 700; color: var(--ink);
  letter-spacing: -0.2px;
}
.chap-desc {
  font-size: 12px; color: var(--muted); margin-left: auto;
}

/* Block (deleted section header) */
.blk {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; margin: 20px 0 6px;
  background: var(--accent-soft);
  border: 1px solid rgba(245,166,35,0.18);
  border-radius: 10px;
}
.blk-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--accent-deep);
  background: rgba(255,255,255,0.7);
  padding: 3px 8px; border-radius: 6px;
}
.blk-rsn { color: var(--ink-2); font-size: 14px; flex:1; }
.blk-dur { font-family: "SF Mono", monospace; font-size: 12px; color: var(--accent-deep); font-weight: 600; font-variant-numeric: tabular-nums; }

/* Checkbox */
.chk {
  width: 20px; height: 20px; border: 1.5px solid var(--hairline-strong); border-radius: 6px;
  cursor: pointer; display:flex; align-items:center; justify-content:center;
  font-size: 12px; color: transparent; transition: all .12s; flex-shrink:0;
  background: var(--surface);
}
.chk:hover { border-color: var(--accent); }
.chk.on { border-color: var(--accent); background: var(--accent); color: #fff; }

/* Sentence row */
.row {
  display: flex; align-items: flex-start;
  padding: 4px 14px; border-radius: 8px; margin-bottom: 0;
  cursor: pointer; transition: background .1s;
  border-left: 3px solid transparent;
}
/* First row of a speaker block gets top spacing */
.row:not(.same-sp) { padding-top: 10px; }
/* Last row of a speaker block (next has different speaker or is end) — add bottom space */
.row.sp-last { padding-bottom: 10px; }
.row:hover { background: var(--surface-2); }
.row.act { background: var(--accent-soft); border-left-color: var(--accent); }
.row.del { opacity: .5; }
.row.del:hover { opacity: .75; }
.row.del .r-txt { text-decoration: line-through; text-decoration-color: var(--muted); color: var(--muted); }
.row.sug { border-left: 3px dashed var(--accent); }
.row.sug .r-txt { text-decoration-style: dashed; }
/* Same-speaker continuation: hide repeated speaker name */
.row.same-sp .r-sp { visibility: hidden; }
.sug-reason {
  display: inline-block; margin-left: 8px;
  font-size: 11px; color: var(--accent-deep); font-weight: 600;
  background: var(--accent-soft); padding: 2px 8px; border-radius: 6px;
  vertical-align: middle;
  border: 1px solid rgba(245,166,35,0.18);
}

.r-chk { margin-right: 12px; padding-top: 3px; }
.r-sp { font-size: 14px; font-weight: 700; min-width: 56px; flex-shrink:0; margin-right: 12px; padding-top: 4px; color: var(--ink-2); }
.r-tm { display: none; }
.r-txt { font-size: 16px; line-height: 1.8; color: var(--ink); flex:1; min-width:0; }
.r-num { font-family:"SF Mono",monospace; font-size: 11px; color: var(--light); min-width: 32px; flex-shrink:0; margin-right: 8px; padding-top: 6px; text-align:right; user-select:none; font-variant-numeric: tabular-nums; }

/* Half-sentence deletion */
.r-txt .pd {
  text-decoration: line-through; text-decoration-color: var(--muted);
  color: var(--muted); background: var(--accent-soft);
  cursor: pointer; border-radius: 3px;
  padding: 0 2px;
}

/* Selection float button */
#selbtn {
  position: fixed; z-index: 9999; display:none;
  background: var(--ink); color:#fff;
  font-size: 13px; font-weight:600;
  padding: 8px 14px; border-radius: 8px;
  cursor:pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.18);
  user-select:none;
  font-family: inherit;
}
#selbtn:hover { background: var(--accent); }

/* ===== PLAYER ===== */
.player {
  position: fixed; bottom:0; left:0; right:0; z-index:1000;
  background: var(--surface);
  border-top: 1px solid var(--hairline);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
  height: 80px;
  display: flex; align-items: center; padding: 0 28px; gap: 20px;
}

.p-time {
  font-family: "SF Mono", monospace;
  font-size: 14px; color: var(--ink); min-width: 56px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.p-total {
  font-family: "SF Mono", monospace;
  font-size: 14px; color: var(--muted); min-width: 56px;
  font-variant-numeric: tabular-nums;
}

.p-track { flex:1; height: 6px; background: var(--hairline); cursor:pointer; position:relative; border-radius:3px; }
.p-fill { height:100%; background: var(--accent); width:0%; transition:width .05s; border-radius:3px; position:relative; }
.p-leaf {
  position:absolute; right:-7px; top:-5px;
  width:16px; height:16px;
  background: #fff; border-radius: 50%;
  transition: right .05s;
  box-shadow: 0 0 0 2px var(--accent), 0 2px 6px rgba(0,0,0,0.15);
}
.p-track:active .p-fill { transition:none; }
.p-track:active .p-leaf { transition:none; }

.p-btn {

function fm(s){ if(s<0)s=0; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60); return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`; }
function esc(t){ return String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 半句删除：字符级渲染。pdel 段用 [cs,ce) 字符区间标记，落在区间内的字符串划线。
// 字符级（而非整词）才能显示"词内部分删除"，与导出的插值时间一致。
function txtHtml(x){
  if(!x.w || !x.w.length) return esc(x.t);  // 兼容无逐词时间的旧数据
  const full = x.w.map(w=>w.t).join('');
  const ranges = pdel[x.idx] || [];
  let html='', i=0;
  while(i < full.length){
    const ri = ranges.findIndex(r => i >= r.cs && i < r.ce);
    if(ri >= 0){
      html += `<span class="pd" data-ri="${ri}">${esc(full.slice(i, ranges[ri].ce))}</span>`;
      i = ranges[ri].ce;
    } else {
      const starts = ranges.filter(r => r.cs > i).map(r => r.cs);
      const nx = starts.length ? Math.min(...starts) : full.length;
      html += esc(full.slice(i, nx));
      i = nx;
    }
  }
  return html;
}

// ===== STATS =====
function computeStats() {
  const td=S.length?S[S.length-1].e:0; let rd=0; const rbt={}, sd={};
  S.forEach(x=>{const d=x.e-x.s;if(del.has(x.idx)){rd+=d;rbt[x.dt||'other']=(rbt[x.dt||'other']||0)+d}else if(x.sp){sd[x.sp]=(sd[x.sp]||0)+d}});
  // 半句删除（仅对未整句删除的句子生效）
  for(const k in pdel){ const idx=+k; if(del.has(idx))continue; const x=S.find(s=>s.idx===idx); pdel[k].forEach(r=>{const d=r.e-r.s; rd+=d; rbt.partial=(rbt.partial||0)+d; if(x&&x.sp&&sd[x.sp])sd[x.sp]=Math.max(0,sd[x.sp]-d);}); }
  return {td, rd, rc:td-rd, rbt, sd};
}

function renderSidebar() {
  const {td, rd, rc, rbt, sd} = computeStats();

  document.getElementById('d-from').textContent=fm(td);

  cc.sort((a,b)=>b.d-a.d);
  const pts=[];
  if(fd>0)pts.push(`${Math.round(fd/60)} 分钟${fn.join('、')}`);

function parseDecisionSections(report) {
  const grouped = parseDecisionGroups(report);
  if (grouped.length) return grouped;

  const sections = [];
  let current = null;
  const start = (title, firstLine = '') => {
    if (current) sections.push(current);
    current = { title: title.replace(/[:：]\s*$/, '').trim() || '剪辑决策', lines: [] };
    if (firstLine.trim()) current.lines.push(firstLine.trim());
  };

  String(report).split(/\r?\n/).forEach((line) => {
    const trimmed = line.trim();
    const heading = trimmed.match(/^#{1,3}\s+(.+)$/);
    const strong = trimmed.match(/^\*\*([^*]{2,80})\*\*[:：]?\s*(.*)$/);

    if (heading) {
      start(heading[1]);
      return;
    }
    if (strong) {
      start(strong[1], strong[2] || '');
      return;
    }
    if (!current) start('剪辑决策');
    current.lines.push(line);
  });

  if (current) sections.push(current);
  return sections
    .map((section) => ({
      ...section,
      lines: section.lines.filter((line, index, lines) => line.trim() || (lines[index - 1]?.trim() && lines[index + 1]?.trim())),
    }))
    .filter((section) => section.title || section.lines.some((line) => line.trim()));
}

function parseDecisionGroups(report) {
  const groups = [
    { title: '前情总览', lines: [] },
    { title: '第一幕', lines: [] },
    { title: '第二幕', lines: [] },
    { title: '第三幕', lines: [] },
  ];
  let current = groups[0];

  String(report).split(/\r?\n/).forEach((line) => {
    const trimmed = line.trim();
    const isHeading = /^#{1,3}\s+/.test(trimmed);
    const isStrongHeading = /^\*\*([^*]+)\*\*[:：]?\s*(.*)$/.test(trimmed);
    if (!isHeading && !isStrongHeading) {
      current.lines.push(line);
      return;
    }
    const titleText = trimmed
      .replace(/^#{1,3}\s+/, '')
      .replace(/^\*\*([^*]+)\*\*[:：]?\s*(.*)$/, '$1 $2')
      .trim();
    if (/^前情总览/.test(titleText)) {
      current = groups[0];
      current.title = '前情总览';
      return;
    }
    const act = titleText.match(/^(第一幕|第二幕|第三幕)[:：\s]*(.*)$/);
    if (act) {
      current = groups[{ '第一幕': 1, '第二幕': 2, '第三幕': 3 }[act[1]]];
      current.title = act[2] ? `${act[1]}：${act[2].replace(/[\[\]]/g, '').trim()}` : act[1];
      return;
    }
    current.lines.push(line);
  });

  const hasAct = groups.slice(1).some((group) => group.lines.some((line) => line.trim()));
  if (!hasAct) return [];
  return groups.map((group) => ({
    ...group,
    lines: group.lines.filter((line, index, lines) => line.trim() || (lines[index - 1]?.trim() && lines[index + 1]?.trim())),
  }));
}

function renderDecisionLines(lines) {
  const html = lines.map((line) => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    const heading = trimmed.match(/^#{2,5}\s+(.+)$/);
    if (heading) return `<div class="decision-subhead">${inlineDecisionMarkdown(heading[1])}</div>`;
    const strongHeading = trimmed.match(/^\*\*([^*]{2,80})\*\*[:：]?\s*$/);
    if (strongHeading) return `<div class="decision-subhead">${inlineDecisionMarkdown(strongHeading[1])}</div>`;
    const bullet = /^[-*]\s+/.test(trimmed);
    const text = bullet ? trimmed.replace(/^[-*]\s+/, '') : trimmed;
    return `<p class="${bullet ? 'decision-bullet' : ''}">${inlineDecisionMarkdown(text)}</p>`;
  }).filter(Boolean).join('');
  return html || '<p>暂无详细内容。</p>';
}

function inlineDecisionMarkdown(text) {
  return esc(text).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

function normalizeDecisionSection(section, index) {
  let action = section.action || '';
  const lines = [];
  section.lines.forEach((line) => {
    const match = line.trim().match(/^[-*]?\s*建议[:：]\s*(保留|删除|压缩)\s*$/);
    if (match) {
      action = match[1];
      return;
    }
    lines.push(line);
  });
  return {
    ...section,
    lines,
    action: action || inferDecisionAction({ ...section, lines }),
    note: section.note || lines.join('\n').trim(),
    chapterIndex: section.chapterIndex ?? mapDecisionToChapter(index),
  };
}

function loadDecisionReport() {
  const injected = String(window.__DECISION_REPORT || '').trim();
  if (window.__READ_ONLY && injected) return injected;
  try {
    const raw = sessionStorage.getItem('jinqian_data') || localStorage.getItem('jinqian_data');
    const payload = raw ? JSON.parse(raw) : null;
    return String(payload?.decisionReport || injected || '').trim();
  } catch (error) {
    return injected;
  }
}

function loadDecisionError() {
  const injected = String(window.__DECISION_ERROR || '').trim();
  if (window.__READ_ONLY && injected) return injected;
  try {
    const raw = sessionStorage.getItem('jinqian_data') || localStorage.getItem('jinqian_data');
    const payload = raw ? JSON.parse(raw) : null;
    return String(payload?.decisionError || payload?.decisionSaveError || injected || '').trim();
  } catch (error) {

}

function inferDecisionAction(section) {
  const text = `${section.title}\n${section.lines.join('\n')}`;
  if (/删除|删掉|砍掉|不要/.test(text)) return '删除';
  if (/压缩|精简|缩短|收紧/.test(text)) return '压缩';
  return '保留';
}

function mapDecisionToChapter(index) {
  if (!CHAPS.length) return 0;
  return Math.min(Math.max(0, index), CHAPS.length - 1);
}

function bindDecisionEditors() {
  document.querySelectorAll('[data-decision-title], [data-decision-action], [data-decision-note]').forEach((el) => {
    el.addEventListener('input', () => saveDecisionFromEditors(false));
    el.addEventListener('change', () => saveDecisionFromEditors(true));
  });
}

function toggleDecisionEdit(index) {
  if (window.__READ_ONLY) return;
  const block = document.querySelectorAll('.decision-block')[index];
  if (!block) return;
  const editing = !block.classList.contains('editing');
  block.classList.toggle('editing', editing);
  const btn = block.querySelector('.decision-tools button:last-child');
  if (btn) btn.textContent = editing ? '完成' : '编辑';
  if (!editing) {
    saveDecisionFromEditors(true);

function saveDecisionFromEditors(showSaved) {
  if (window.__READ_ONLY) return;
  if (!decisionSections.length) return;
  decisionSections = decisionSections.map((section, index) => {
    const title = document.querySelector(`[data-decision-title="${index}"]`)?.value.trim() || section.title;
    const action = document.querySelector(`[data-decision-action="${index}"]`)?.value || section.action || '保留';
    const note = document.querySelector(`[data-decision-note="${index}"]`)?.value.trim() || '';
    return {
      ...section,
      title,
      action,
      note,
      lines: note ? note.split(/\r?\n/) : section.lines,
    };
  });
  DECISION_REPORT = decisionSectionsToMarkdown(decisionSections);
  persistDecisionReport(DECISION_REPORT);
  if (showSaved) {
    const status = document.getElementById('sv');
    if (status) status.textContent = '自动保存：剪辑决策已保存';
    toast('剪辑决策已保存');
  }
}

function decisionSectionsToMarkdown(sections) {
  return sections.map((section) => {
    const lines = String(section.note || '').split(/\r?\n/).filter(Boolean);
    return [
      `## ${section.title}`,
      `- 建议：${section.action || '保留'}`,
      ...lines,
    ].join('\n');
  }).join('\n\n');
}

function persistDecisionReport(report) {
  if (window.__READ_ONLY) return;
  try {
    const raw = sessionStorage.getItem('jinqian_data') || localStorage.getItem('jinqian_data') || '{}';
    const payload = JSON.parse(raw);
    payload.decisionReport = report;
    payload.projectId = window.__PROJECT_ID || payload.projectId;
    const serialized = JSON.stringify(payload);
    sessionStorage.setItem('jinqian_data', serialized);
    localStorage.setItem('jinqian_data', serialized);
    scheduleProjectSave();
  } catch (error) {
    console.warn('剪辑决策保存失败', error);
  }
}

function locateDecision(index) {
  const chapterIndex = decisionSections[index]?.chapterIndex ?? mapDecisionToChapter(index);

function decisionIndexForChapter(chapterIndex) {
  if (!decisionSections.length) return 0;
  return Math.min(Math.max(0, chapterIndex), decisionSections.length - 1);
}

function startRenameSp(origName) {
  if (window.__READ_ONLY) return;
  const nameEl = document.getElementById('spchip-' + origName);
  if (!nameEl) return;
  const current = displaySp(origName);
  const input = document.createElement('input');
  input.className = 'sp-rename-input';
  input.value = current;
  input.style.width = Math.max(60, current.length * 10) + 'px';
  nameEl.replaceWith(input);
  input.focus();
  input.select();
  const commit = () => {
    const newName = input.value.trim();
    if (newName) spDisplayNames[origName] = newName;
    renderDurInfo();
    renderTx();
    // update sidebar speaker legend
    const { rc, sd } = computeStats();
    const en = spList.filter(sp => sd[sp] > 0).map(sp => ({ n: sp, d: sd[sp] || 0 }));
    if (en.length) {
      document.getElementById('spleg').innerHTML = en.map(e => {
        const p = Math.round(e.d / rc * 100);
        return `<div class="sp-row"><span class="sp-dot" style="background:${spCMap[e.n]}"></span><span class="sp-name">${esc(displaySp(e.n))}</span><span class="sp-val">${p}% · ${fm(e.d)}</span></div>`;
      }).join('');
    }
    sv();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

function initSidebarResize() {

  let dragging = false;

    if (!dragging) return;

  const onUp = () => {

function renderTx() {
  const c=document.getElementById('tx');let h='';
  // Block map (deleted sections)
  const bm={};BLK.forEach(b=>{for(let i=b.r[0];i<=b.r[1];i++)bm[i]=b});
  // Chapter map (content sections)
  const cm={};CHAPS.forEach((ch,i)=>{if(ch.startIdx!==undefined)cm[ch.startIdx]={...ch,num:i+1}});

  let lb=null;
  // Speaker grouping: track previous speaker, reset on chapter/block boundaries
  let prevSp=null, resetNext=false;

  S.forEach((x, si)=>{
    const isChapBoundary = !!cm[x.idx];
    const b=bm[x.idx];
    const isBlockBoundary = b && b!==lb;

    if (isChapBoundary || isBlockBoundary) resetNext = true;

    // Chapter header — content section divider
    if(isChapBoundary){
      const ch=cm[x.idx];
      h+=`<div class="chap-hdr" id="chap${ch.num}">
        <span class="chap-num">${String(ch.num).padStart(2,'0')}</span>
        <span class="chap-title">${esc(ch.title)}</span>
        <span class="chap-desc">${esc(ch.desc||'')}</span>
      </div>`;
    }

    // Block header — deleted section
    if(b&&b!==lb){
      const ck=isBD(b);
      h+=`<div class="blk"><div class="chk ${ck?'on':''}" onclick="tgB(${b.id})">✕</div><span class="blk-tag">${TL[b.type]||b.type}</span><span class="blk-rsn">${b.reason}</span><span class="blk-dur mono">${b.dur}</span></div>`;
      lb=b;
    }

    // Speaker grouping
    const sameSp = !resetNext && x.sp === prevSp;
    const nextX = S[si+1];
    const nextChap = nextX && !!cm[nextX.idx];
    const nextBlock = nextX && bm[nextX.idx] && bm[nextX.idx] !== b;
    const isLast = !nextX || nextX.sp !== x.sp || nextChap || nextBlock;
    resetNext = false;
    prevSp = x.sp;

    // Sentence row
    const id=del.has(x.idx);
    const isSug = x.sug && id;
    let cl='row';
    if(id) cl+=' del';
    if(isSug) cl+=' sug';
    if(x.idx===curIdx) cl+=' act';
    if(sameSp) cl+=' same-sp';
    if(isLast) cl+=' sp-last';
    const reasonTag = (isSug && x.sugReason) ? `<span class="sug-reason">${esc(x.sugReason)}</span>` : '';
    h+=`<div class="${cl}" id="r${x.idx}" onclick="goTo(${x.idx})"><div class="r-chk"><div class="chk ${id?'on':''}" onclick="event.stopPropagation();tgS(${x.idx})">✕</div></div><div class="r-num mono">${x.idx+1}</div><div class="r-sp">${esc(displaySp(x.sp))}</div><div class="r-tm">${x.ts}</div><div class="r-txt">${txtHtml(x)}${reasonTag}</div></div>`;
  });
  c.innerHTML=h;
}

function delSel(){
  if (window.__READ_ONLY) return;
  const sel=window.getSelection(); if(!sel||sel.isCollapsed) return;
  const range=sel.getRangeAt(0);
  const an=sel.anchorNode; const el=(an&&an.nodeType===1?an:an&&an.parentElement);
  const txt=el&&el.closest('.r-txt'); if(!txt){ hideSelBtn(); return; }
  const idx=+txt.closest('.row').id.slice(1);
  const x=S.find(s=>s.idx===idx); if(!x||!x.w){ hideSelBtn(); return; }
  const selText=sel.toString(); if(!selText.trim()){ hideSelBtn(); return; }

  // 精确字符偏移：从 r-txt 起点到选区起点的文本长度（不依赖 indexOf，避免同字误匹配）
  const pre=document.createRange(); pre.setStart(txt,0); pre.setEnd(range.startContainer, range.startOffset);
  const pos=pre.toString().length;
  const wt=x.w.map(w=>w.t); const full=wt.join('');
  const delEnd=Math.min(pos+selText.length, full.length);
  if(pos<0 || delEnd<=pos){ hideSelBtn(); return; }

  // 字符区间 [pos,delEnd) → 词 + 词内偏移
  let cc=0, sW=null, eW=null, sOff=0, eOff=0;
  for(let i=0;i<wt.length;i++){
    const wS=cc, wE=cc+wt[i].length;
    if(sW===null && wE>pos){ sW=i; sOff=pos-wS; }
    if(wE>=delEnd){ eW=i; eOff=wE-delEnd; break; }
    cc=wE;
  }
  if(sW===null||eW===null){ hideSelBtn(); return; }
  const sw=x.w[sW], ew=x.w[eW];
  // 词内按字符比例插值时间（ASR 合词时也能切准）
  let st=(sOff>0 && wt[sW].length>0) ? sw.s+(sw.e-sw.s)*(sOff/wt[sW].length) : sw.s;
  let et=(eOff>0 && wt[eW].length>0) ? ew.e-(ew.e-ew.s)*(eOff/wt[eW].length) : ew.e;
  // 有条件边界扩展（仅当选区正好落在词边界时）：起点 gap<0.2s 前移，终点 gap<2s 延后，吃掉死气间隙
  if(sOff===0 && sW>0){ const pv=x.w[sW-1]; const g=st-pv.e; if(g>=0&&g<0.20) st=pv.e; }
  if(eOff===0 && eW<x.w.length-1){ const nx=x.w[eW+1]; const g=nx.s-et; if(g>=0&&g<2.0) et=nx.s; }

  (pdel[idx]=pdel[idx]||[]).push({cs:pos, ce:delEnd, s:Math.round(st*1000)/1000, e:Math.round(et*1000)/1000});
  um.add(idx);
  sel.removeAllRanges(); hideSelBtn(); renderTx(); sv();
}

// 收集所有半句删除时间段（跳过整句已删的句子，避免重复）
function pdelRanges(){
  const out=[];
  for(const k in pdel){ const idx=+k; if(del.has(idx)) continue; pdel[k].forEach(r=>out.push([r.s,r.e])); }
  return out;
}

function findVisibleSentenceIdx() {

  const rows = document.querySelectorAll('.row:not(.del)');

// Compute virtual time (rough cut position) from original time
function originalToVirtual(origTime) {
  let virtualTime = 0;
  let lastEnd = 0;
  // Sort kept segments
  const kept = [];
  let segStart = null;
  S.forEach(x => {
    if (!del.has(x.idx)) {
      if (segStart === null) segStart = x.s;
    } else {
      if (segStart !== null) {
        kept.push({ s: segStart, e: x.s });
        segStart = null;
      }
    }
  });
  if (segStart !== null) {
    const lastS = S[S.length - 1];
    kept.push({ s: segStart, e: lastS.e });
  }

  for (const seg of kept) {
    if (origTime <= seg.s) break;
    if (origTime >= seg.e) {
      virtualTime += seg.e - seg.s;
    } else {
      virtualTime += origTime - seg.s;
      break;
    }
  }
  return virtualTime;
}

async function doExport(options = {}){
  if (window.__READ_ONLY) return;
  // 收集所有删除时间段：整句删除 + 半句删除，排序后合并相邻（间隙<1.5s）
  let ranges=[];
  S.forEach(x=>{ if(del.has(x.idx)) ranges.push([x.s,x.e]); });
  ranges=ranges.concat(pdelRanges());
  ranges.sort((p,q)=>p[0]-q[0]);
  const segs=[];let c=null;
  ranges.forEach(r=>{ if(c&&(r[0]-c.end)<1.5){ if(r[1]>c.end)c.end=r[1]; } else { if(c)segs.push(c); c={start:r[0],end:r[1]}; } });
  if(c)segs.push(c);
  // Extend first segment to 0 to avoid opening artifacts
  if(segs.length>0 && segs[0].start<5) segs[0].start=0;

  const stats = computeStats();
  const data = {
    version: "roughcut_v1",
    exported_at: new Date().toISOString(),
    original_duration: Math.round(stats.td),
    roughcut_duration: Math.round(stats.rc),
    removed_duration: Math.round(stats.rd),
    segments: segs
  };

  const injected = (() => {
    try { return JSON.parse(sessionStorage.getItem('jinqian_data') || localStorage.getItem('jinqian_data') || '{}'); }
    catch (error) { return {}; }
  })();
  const cutPayload = {
    ...data,
    audioUrl: window.__AUDIO_OVERRIDE || document.getElementById('au').src,
    fileName: injected.fileName || window.__FILE_NAME || 'podcast.mp3',
    refineSettings: {...refineSettings}
  };
  const serializedCutPayload = JSON.stringify(cutPayload);
  sessionStorage.setItem('jinqian_cut_data', serializedCutPayload);
  try { localStorage.setItem('jinqian_cut_data', serializedCutPayload); } catch(e) {}
  await saveProjectNow(false);
  if (options.next === 'cut') {
    location.href = 'cut.html';
    return;
  }
  const snapshotResult = await createReviewSnapshot(cutPayload, data);
  if (snapshotResult) {
    toast('已提交给助教审核');
    setTimeout(() => { location.href = 'projects.html'; }, 500);
    return;
  }
  toast('已保存剪辑，但审核快照暂时没有提交成功');
}

async function createReviewSnapshot(cutPayload, metricsSource) {

function buildCurrentMetrics(){
  const stats = computeStats();
  return {
    originalDuration: Math.round(stats.td || 0),
    roughcutDuration: Math.round(stats.rc || 0),
    removedDuration: Math.round(stats.rd || 0),
  };
}
function buildJsonHeaders(){
  const headers = {'Content-Type':'application/json'};
  const token = readStoredToken();
  if (token) headers.Authorization = `Bearer ${token}`;
  return headers;
}
window.addEventListener('pagehide', () => {
  if (window.__READ_ONLY || !window.__PROJECT_ID) return;
  const payload = persistCurrentPayload();
  if (!payload) return;
  try {
    fetch(`/api/projects/${encodeURIComponent(window.__PROJECT_ID)}`, {
      method: 'PATCH',
      headers: buildJsonHeaders(),
      body: JSON.stringify({
        fileName: payload.fileName || window.__FILE_NAME || '未命名音频',
        audioUrl: payload.audioUrl || window.__AUDIO_OVERRIDE || document.getElementById('au').src,
        payload,
        metrics: buildCurrentMetrics(),
      }),
      keepalive: true,
    });
  } catch {}
});
function showT(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('vis');setTimeout(()=>el.classList.remove('vis'),2000)}
