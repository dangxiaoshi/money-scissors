<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金钱剪刀 · 工具已下架</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  :root {
    --gold-1: #c8952a;
    --gold-2: #e8b84b;
    --text-dark: #1a1209;
    --text-mid: #5a4a2a;
    --text-light: #9a8a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    align-items: center;
    background: #f5f0e8;
    color: var(--text-dark);
    display: flex;
    font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: rgba(255, 255, 255, .94);
    border: 1px solid rgba(200, 149, 42, .15);
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(200, 149, 42, .12);
    max-width: 520px;
    padding: 32px;
    text-align: center;
    width: 100%;
  }

  .mark {
    align-items: center;
    background: linear-gradient(135deg, #f5d06a, #c8952a);
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(200, 149, 42, .3);
    color: #fff;
    display: inline-flex;
    font-size: 24px;
    height: 52px;
    justify-content: center;
    margin-bottom: 18px;
    width: 52px;
  }

  h1 {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0;
    margin-bottom: 10px;
  }

  p {
    color: var(--text-mid);
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 22px;
  }

  a {
    background: linear-gradient(135deg, #b8821e, #c8952a, #e8b84b);
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(200, 149, 42, .28);
    color: #fff;
    display: inline-flex;
    font-size: 15px;
    font-weight: 800;
    justify-content: center;
    min-width: 150px;
    padding: 13px 18px;
    text-decoration: none;
  }
</style>
</head>
<body>
  <main class="card">
    <div class="mark">✦</div>
    <h1>这个工具已下架</h1>
    <p>小红书推广卡片暂时不开放。可以回到剪辑台，继续使用 Show Notes、剪辑决策、旁白生成和声音克隆。</p>
    <a id="back-link" href="/edit">返回剪辑台</a>
  </main>

  <script>
    const editHref = location.pathname.startsWith('/web-test/') ? '/web-test/edit.html' : '/edit';
    document.getElementById('back-link').href = editHref;
  </script>
</body>
</html>
