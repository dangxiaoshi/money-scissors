<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金钱剪刀 · 21天路径</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #f4ecce;
      --bg-2: #e9d9a4;
      --bg-3: #ddc98c;
      --card: #fdf7e6;
      --card-hot: #fffaf0;
      --line: #efcd8e;
      --gold: #e8902f;
      --gold-dark: #c77b2a;
      --text: #352f20;
      --text-soft: #8a7a55;
      --text-faint: #a3926a;
    }
    body {
      background: linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }
    .path-tabs {
      align-items: flex-end;
      background: rgba(255, 255, 255, 0.44);
      backdrop-filter: blur(7px);
      border-bottom: 1px solid rgba(180, 150, 80, 0.16);
      display: flex;
      gap: 24px;
      min-height: 42px;
      padding: 8px 30px 0;
      position: sticky;
      top: 56px;
      z-index: 20;
    }
    .path-tab {
      color: #9a895c;
      font-size: 14px;
      font-weight: 800;
      padding: 0 0 9px;
      position: relative;
      text-decoration: none;
      white-space: nowrap;
    }
    .path-tab.active { color: var(--gold-dark); }
    .path-tab.active::after {
      background: var(--gold);
      border-radius: 3px;
      bottom: 0;
      content: "";
      height: 3px;
      left: 0;
      position: absolute;
      right: 0;
    }
    .wrap {
      margin: 0 auto;
      max-width: 1120px;
      padding: 22px 30px 50px;
    }
    .hero {
      align-items: center;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(180, 140, 60, 0.16);
      display: flex;
      gap: 16px;
      margin-bottom: 22px;
      min-height: 72px;
      padding: 14px 22px;
      position: relative;
    }
    .hero-badge {
      background: var(--gold);
      border-radius: 7px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      left: 18px;
      padding: 2px 10px;
      position: absolute;
      top: -10px;
    }
    .hero-info {
      align-items: center;
      display: flex;
      flex: 1;
      gap: 13px;
      min-width: 0;
    }
    .hero-emoji {
      flex: 0 0 auto;
      font-size: 28px;
      line-height: 1;
    }
    .hero-text {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .hero-titleline {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }
    .hero-meta {
      color: var(--text-faint);
      font-size: 12px;
      font-weight: 700;
    }
    .hero-title {
      color: var(--text);
      font-size: 19px;
      font-weight: 900;
    }
    .hero-goal {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.45;
    }
    .tag {
      border: 1px solid #f0b27a;
      border-radius: 6px;
      color: #e07d2c;
      font-size: 11px;
      font-weight: 800;
      padding: 1px 8px;
      white-space: nowrap;
    }
    .hero-actions {
      display: flex;
      flex: 0 0 auto;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      padding: 10px 16px;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--gold);
      box-shadow: 0 4px 10px rgba(239, 138, 44, 0.28);
      color: #fff;
    }
    .btn-secondary {
      background: #fff1df;
      color: #e07d2c;
    }
    .btn-muted {
      background: #f3edda;
      border: 1px dashed #cdb877;
      color: var(--text-faint);
      cursor: default;
    }
    .week {
      align-items: start;
      display: grid;
      gap: 13px;
      grid-template-columns: 84px repeat(4, minmax(0, 1fr));
      margin-bottom: 13px;
    }
    .week-label {
      padding-top: 8px;
    }
    .week-pill {
      background: #d8c489;
      border-radius: 8px;
      color: #5f5230;
      display: inline-block;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
      padding: 4px 11px;
      white-space: nowrap;
    }
    .week-tags {
      color: #897748;
      font-size: 12px;
      line-height: 1.75;
    }
    .card {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 13px;
      box-shadow: 0 2px 6px rgba(140, 110, 40, 0.10);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      min-height: 92px;
      padding: 12px 13px;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }
    .card:hover {
      box-shadow: 0 8px 16px rgba(140, 110, 40, 0.18);
      transform: translateY(-2px);
    }
    .card.active {
      background: var(--card-hot);
      border-color: var(--gold);
      box-shadow: 0 8px 18px rgba(232, 144, 47, 0.24);
    }
    .card-head {
      align-items: center;
      color: var(--text-faint);
      display: flex;
      font-size: 11.5px;
      justify-content: space-between;
      margin-bottom: 6px;
      min-height: 16px;
    }
    .card-emoji {
      font-size: 23px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .card-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }
    .toast {
      background: #3c3422;
      border-radius: 11px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      color: #fff;
      font-size: 13.5px;
      left: 50%;
      opacity: 0;
      padding: 11px 20px;
      pointer-events: none;
      position: fixed;
      top: 72px;
      transform: translateX(-50%) translateY(-12px);
      transition: 0.25s;
      z-index: 1005;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 840px) {
      .path-tabs { padding-left: 18px; padding-right: 18px; top: 48px; }
      .wrap { padding: 18px 16px 40px; }
      .hero { align-items: flex-start; flex-direction: column; padding: 16px; }
      .hero-actions { justify-content: flex-start; width: 100%; }
      .btn { flex: 1 1 auto; }
      .week { grid-template-columns: 1fr; gap: 8px; }
      .week-label { padding-top: 10px; }
      .week-tags { display: inline; margin-left: 8px; }
      .week-label br { display: none; }
    }
    @media (max-width: 520px) {
      .hero-titleline { gap: 6px; }
      .hero-title { font-size: 18px; }
      .hero-actions { display: grid; grid-template-columns: 1fr; }
      .card { min-height: 82px; }
    }
  </style>
</head>
<body>
  <nav class="path-tabs" aria-label="训练台子导航">
    <a class="path-tab active" href="/training/path.html" data-scoped-link>21天路径</a>
    <a class="path-tab" href="/training/sop.html" data-scoped-link>剪辑课件</a>
  </nav>

  <main class="wrap">
    <section class="hero" id="hero" aria-live="polite"></section>
    <section id="grid" aria-label="21天学习路径"></section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initStationNav } from '../js/station-nav.js?v=20260612-path21';
    import { scopedPath } from '../js/api.js?v=20260610-reviewflow-1';

    const CURRENT_FALLBACK = 'D1';
    const DAY1 = {
      id: 'D1',
      week: 0,
      range: 'D1',
      date: '6/12',
      emoji: '📺',
      title: '开营直播',
      goal: '当众说出目标，写下计划，知道怎么把学费赚回来',
      tag: '直播',
      startsAt: '2026-06-12T19:00:00+08:00',
      endsAt: '2026-06-12T22:00:00+08:00',
      actions: [
        { type: 'homework', label: '👋 做当天作业', href: '/training/intro.html', style: 'secondary' },
        { type: 'live', label: '▶ 看直播回放', href: 'https://www.bilibili.com/video/BV1X6Ey6bEGN/', style: 'primary' },
      ],
    };

    const GRID = [
      {
        id: 'D2',
        week: 1,
        range: 'D2-3',
        date: '6/13',
        emoji: '⚙️',
        title: '剪开营直播',
        goal: '把开营直播上传到剪辑台，剪到25-30分钟。先不用片头、片尾和音乐，重点是跑通流程并提交助教审核',
        actions: [
          { type: 'courseware', label: '🎧 查看剪辑课件', href: '/training/sop.html', style: 'secondary' },
          { type: 'edit', label: '✂️ 打开我的项目', href: '/projects', style: 'primary' },
        ],
      },
      {
        id: 'D4',
        week: 1,
        range: 'D4',
        date: '6/15',
        emoji: '📺',
        title: '派单直播',
        goal: '领第一单，搞清楚每条剪辑值多少钱',
        tag: '直播',
        startsAt: '2026-06-15T19:00:00+08:00',
        actions: [{ type: 'live', label: '▶ 进入直播', href: 'https://meeting.tencent.com/dm/FSviUD11blE3', style: 'primary' }],
      },
      {
        id: 'D5',
        week: 1,
        range: 'D5-6',
        date: '6/16',
        emoji: '✂️',
        title: '接单剪辑',
        goal: '接单→剪辑→提交审核，审完再接下一条',
        actions: [{ type: 'orders', label: '去接单台 →', href: '/orders/', style: 'primary' }],
      },
      {
        id: 'D7',
        week: 1,
        range: 'D7',
        date: '6/18',
        emoji: '📺',
        title: '复盘直播',
        goal: '说说做了什么、卡在哪，老师逐人给建议',
        tag: '直播',
        startsAt: '2026-06-18T19:00:00+08:00',
        actions: [{ type: 'live', label: '▶ 进入直播', href: 'https://meeting.tencent.com/dm/UqtNoHph15rW', style: 'primary' }],
      },
      {
        id: 'D8',
        week: 2,
        range: 'D8',
        date: '6/19',
        emoji: '💼',
        title: '报价+简历',
        goal: '把报价想清楚，开始整理剪辑简历',
        actions: [{ type: 'placeholder', label: '📄 领取模版', message: '领取模版功能还没做，先在群里同步。', style: 'muted' }],
      },
      {
        id: 'D9',
        week: 2,
        range: 'D9',
        date: '6/20',
        emoji: '📺',
        title: '腾讯对接直播',
        goal: '和播客主面对面，现场谈单，谈成直接拿长期甲方',
        tag: '直播',
        startsAt: '2026-06-20T19:00:00+08:00',
        actions: [{ type: 'live', label: '▶ 进入直播', href: 'https://meeting.tencent.com/dm/3PWnk4MJhwgq', style: 'primary' }],
      },
      {
        id: 'D10',
        week: 2,
        range: 'D10-13',
        date: '6/21',
        emoji: '📣',
        title: '简历推广',
        goal: '优化简历，发出去让外面的人知道你',
        actions: [{ type: 'placeholder', label: '📄 领取模版', message: '领取模版功能还没做，先在群里同步。', style: 'muted' }],
      },
      {
        id: 'D14',
        week: 2,
        range: 'D14',
        date: '6/25',
        emoji: '📺',
        title: '复盘直播',
        goal: '答疑复盘，定第三周冲刺目标',
        tag: '直播',
        startsAt: '2026-06-25T19:00:00+08:00',
        actions: [{ type: 'live', label: '▶ 进入直播', href: 'https://meeting.tencent.com/dm/n3TZLai2kWT2', style: 'primary' }],
      },
      {
        id: 'D15',
        week: 3,
        range: 'D15-17',
        date: '6/26',
        emoji: '📁',
        title: '接单+作品集',
        goal: '继续接单剪辑，整理作品集传上去',
        actions: [{ type: 'placeholder', label: '📄 领取模版', message: '领取模版功能还没做，先在群里同步。', style: 'muted' }],
      },
      {
        id: 'D19',
        week: 3,
        range: 'D19',
        date: '6/30',
        emoji: '📺',
        title: '点评答疑',
        goal: '如何剪得又快又好，卡点突破，老师帮你看清',
        tag: '直播',
        startsAt: '2026-06-30T19:00:00+08:00',
        actions: [{ type: 'live', label: '▶ 进入直播', href: 'https://meeting.tencent.com/dm/EhEBUAsMT3Il', style: 'primary' }],
      },
      {
        id: 'D20',
        week: 3,
        range: 'D20',
        date: '7/1',
        emoji: '💰',
        title: '算账+建议',
        goal: '算清这21天的账，老师逐人给下一步建议',
        actions: [{ type: 'placeholder', label: '💬 提交账本 + 提问', message: '提交账本和提问功能还没做，先在群里同步。', style: 'muted' }],
      },
      {
        id: 'D21',
        week: 3,
        range: 'D21',
        date: '7/2',
        emoji: '🎉',
        title: '结营',
        goal: '公布接单情况和返现名单，颁发结业证书（微信群文字直播）',
        tag: '㊙️ 揭晓',
        actions: [],
      },
    ];

    const WEEKS = {
      0: { title: '开营', tags: ['账号', '地图', 'D1作业'] },
      1: { title: '第一周', tags: ['工具熟悉', '第一单', '第一笔钱'] },
      2: { title: '第二周', tags: ['认识甲方', '接单资产', '主动出击'] },
      3: { title: '第三周', tags: ['作品集', '挂牌', '收尾'] },
    };
    const ALL_DAYS = [DAY1, ...GRID];
    let currentId = CURRENT_FALLBACK;
    let viewingId = CURRENT_FALLBACK;
    let unlock = { day1: false, day2: false };

    init();

    async function init() {
      const auth = await initStationNav({ active: 'training' });
      if (!auth) return;
      const user = auth.user || {};
      unlock = {
        day1: Boolean(user.isAdmin || user.day1Complete),
        day2: Boolean(user.isAdmin || user.day2Complete),
      };
      currentId = getCurrentId();
      viewingId = currentId;
      scopeStaticLinks();
      renderHero(getDay(viewingId));
      renderGrid();
    }

    function scopeStaticLinks() {
      document.querySelectorAll('[data-scoped-link]').forEach((link) => {
        link.href = scopedPath(link.getAttribute('href'));
      });
    }

    function getCurrentId() {
      return CURRENT_FALLBACK;
    }

    function getDay(id) {
      return ALL_DAYS.find((day) => day.id === id) || DAY1;
    }

    function renderHero(day) {
      const tag = day.tag ? `<span class="tag">${day.tag}</span>` : '';
      const badge = day.id === currentId ? '<span class="hero-badge">📍 先从这里开始</span>' : '';
      const buttons = day.actions.map((action, index) => `
        <button class="btn btn-${action.style || 'secondary'}" type="button" data-action-index="${index}">
          ${escapeHtml(action.label)}
        </button>
      `).join('');
      document.getElementById('hero').innerHTML = `
        ${badge}
        <div class="hero-info">
          <span class="hero-emoji">${day.emoji}</span>
          <div class="hero-text">
            <div class="hero-titleline">
              <span class="hero-meta">${day.range} · ${day.date}</span>
              ${tag}
              <span class="hero-title">${escapeHtml(day.title)}</span>
            </div>
            <div class="hero-goal">${escapeHtml(day.goal)}</div>
          </div>
        </div>
        <div class="hero-actions">${buttons}</div>
      `;
      document.querySelectorAll('[data-action-index]').forEach((button) => {
        button.addEventListener('click', () => runAction(day.actions[Number(button.dataset.actionIndex)]));
      });
    }

    function renderGrid() {
      const html = [0, 1, 2, 3].map((week) => {
        const meta = WEEKS[week];
        const days = ALL_DAYS.filter((day) => day.week === week);
        if (!days.length) return '';
        const cards = days.map((day) => {
          const tag = day.tag ? `<span class="tag">${day.tag}</span>` : '<span></span>';
          return `
            <button class="card ${viewingId === day.id ? 'active' : ''}" type="button" data-day="${day.id}">
              <span class="card-head"><span>${day.range} · ${day.date}</span>${tag}</span>
              <span class="card-emoji">${day.emoji}</span>
              <span class="card-title">${escapeHtml(day.title)}</span>
            </button>
          `;
        }).join('');
        return `
          <div class="week">
            <div class="week-label">
              <span class="week-pill">${meta.title}</span>
              <div class="week-tags">${meta.tags.map(escapeHtml).join('<br>')}</div>
            </div>
            ${cards}
          </div>
        `;
      }).join('');
      document.getElementById('grid').innerHTML = html;
      document.querySelectorAll('[data-day]').forEach((card) => {
        card.addEventListener('click', () => selectDay(card.dataset.day));
      });
    }

    function selectDay(id) {
      viewingId = viewingId === id ? currentId : id;
      renderHero(getDay(viewingId));
      renderGrid();
    }

    function runAction(action) {
      if (!action) return;
      if (action.type === 'live') {
        window.open(action.href, '_blank', 'noopener');
        return;
      }
      if (action.type === 'homework' || action.type === 'courseware') {
        location.href = scopedPath(action.href);
        return;
      }
      if (action.type === 'edit') {
        if (!unlock.day1) {
          toast('🔒 不是网站坏了：先完成 D1 自我介绍作业，剪辑台就会自动解锁');
          return;
        }
        location.href = scopedPath(action.href);
        return;
      }
      if (action.type === 'orders') {
        if (!unlock.day1) {
          toast('🔒 不是网站坏了：先完成 D1 自我介绍，再去剪辑台做 D2 练习');
          return;
        }
        if (!unlock.day2) {
          toast('🔒 不是网站坏了：先在剪辑台提交 D2 开营直播剪辑练习，接单台就会自动解锁');
          return;
        }
        location.href = scopedPath(action.href);
        return;
      }
      if (action.type === 'placeholder') toast(action.message);
    }

    let toastTimer;
    function toast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
