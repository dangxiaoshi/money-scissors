<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金钱剪刀 · 后台</title>
  <link rel="stylesheet" href="css/shared.css?v=20260529b">
  <style>
    .cell-link { color:#C8820A; font-weight:700; cursor:pointer; text-decoration:none; background:none; border:none; padding:0; font-size:inherit; }
    .cell-link:hover { text-decoration:underline; }
    .cell-muted { color:#9a9a9a; }
    .pending-pill { display:inline-block; min-width:20px; padding:1px 8px; border-radius:999px; background:#FBE7C2; color:#9a5a00; font-weight:800; }
    .pending-zero { color:#b8b8b8; }
    .modal-mask { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:9999; padding:20px; }
    .modal-mask.open { display:flex; }
    .modal-box { background:#fff; border-radius:16px; max-width:560px; width:100%; max-height:84vh; overflow:auto; box-shadow:0 24px 60px rgba(0,0,0,.25); }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid #eee; position:sticky; top:0; background:#fff; }
    .modal-title { font-size:18px; font-weight:800; }
    .modal-close { border:none; background:none; font-size:22px; cursor:pointer; color:#888; line-height:1; }
    .modal-body { padding:18px 22px 24px; }
    .intro-q { font-size:13px; color:#B07A18; font-weight:700; margin:14px 0 4px; }
    .intro-a { font-size:15px; line-height:1.6; color:#333; white-space:pre-wrap; }
    .intro-empty { color:#999; padding:10px 0; }
    .snap-item { border:1px solid #eee; border-radius:12px; padding:12px 14px; margin-bottom:10px; }
    .snap-meta { font-size:13px; color:#666; margin-bottom:8px; }
    .snap-actions { display:flex; gap:8px; flex-wrap:wrap; }
  </style>
</head>
<body>
  <main class="shell shell-wide">
    <header class="top-chrome">
      <div>
        <div class="top-title">金钱剪刀 后台</div>
        <div class="top-sub">用户列表、使用次数和微信跟进状态。</div>
      </div>
      <div class="top-actions">
        <a class="secondary-btn inline-btn" href="/orders/admin">接单台后台</a>
        <a class="secondary-btn inline-btn" href="/" id="home-link">回到工具</a>
        <span class="user-chip" id="user-phone"></span>
        <button class="secondary-btn inline-btn" id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <section class="card">
      <div class="toolbar-row">
        <div class="segmented">
          <button class="segmented-btn active" data-view="users" type="button">用户列表</button>
          <button class="segmented-btn" data-view="snapshots" type="button">审核快照</button>
        </div>
        <button class="secondary-btn inline-btn" id="export-btn" type="button">导出 CSV</button>
      </div>
      <div class="toolbar-row" id="user-filter-row">
        <div class="segmented">
          <button class="segmented-btn active" data-filter="all" type="button">全部</button>
          <button class="segmented-btn" data-filter="used_3" type="button">≥3次</button>
          <button class="segmented-btn" data-filter="pending" type="button">有待审</button>
        </div>
      </div>
      <div class="error" id="error"></div>
      <div class="table-wrap" id="users-panel">
        <table class="data-table">
          <thead>
            <tr>
              <th>手机号</th>
              <th>微信名</th>
              <th>注册时间</th>
              <th>最后活跃</th>
              <th>次数</th>
              <th>D1作业</th>
              <th>D2作业</th>
              <th>待审核</th>
              <th>备注</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
      <div class="table-wrap" id="snapshots-panel" hidden>
        <table class="data-table">
          <thead>
            <tr>
              <th>项目</th>
              <th>剪辑师</th>
              <th>导出时间</th>
              <th>状态</th>
              <th>原始</th>
              <th>粗剪</th>
              <th>删减</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="snapshot-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-mask" id="modal-mask">
    <div class="modal-box">
      <div class="modal-head">
        <div class="modal-title" id="modal-title">学员作业</div>
        <button class="modal-close" id="modal-close" type="button">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/admin.js?v=20260612-archive"></script>
</body>
</html>
