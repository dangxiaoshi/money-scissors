<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金钱剪刀 · 后台</title>
  <link rel="stylesheet" href="css/shared.css?v=20260529b">
</head>
<body>
  <main class="shell shell-wide">
    <header class="top-chrome">
      <div>
        <div class="top-title">金钱剪刀 后台</div>
        <div class="top-sub">用户列表、使用次数和微信跟进状态。</div>
      </div>
      <div class="top-actions">
        <a class="secondary-btn inline-btn" href="/" id="home-link">回到工具</a>
        <span class="user-chip" id="user-phone"></span>
        <button class="secondary-btn inline-btn" id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <section class="card">
      <div class="toolbar-row">
        <div class="segmented">
          <button class="segmented-btn active" data-filter="all" type="button">全部</button>
          <button class="segmented-btn" data-filter="used_3" type="button">≥3次</button>
          <button class="segmented-btn" data-filter="wechat_yes" type="button">已加微信</button>
          <button class="segmented-btn" data-filter="wechat_no" type="button">未加微信</button>
        </div>
        <button class="secondary-btn inline-btn" id="export-btn" type="button">导出 CSV</button>
      </div>
      <div class="error" id="error"></div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>手机号</th>
              <th>注册时间</th>
              <th>最后活跃</th>
              <th>次数</th>
              <th>微信</th>
              <th>备注</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="js/admin.js?v=20260527-2"></script>
</body>
</html>
