<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金钱剪刀 · 生成备用 MP3</title>
  <link rel="stylesheet" href="css/shared.css?v=20260529b">
  <style>
    .cut-status {
      font-size: 24px;
      font-weight: 780;
      margin-bottom: 8px;
    }
    .cut-detail {
      color: var(--muted);
      font-size: 15px;
      min-height: 28px;
    }
    .download-row {
      margin-top: 24px;
    }
    .primary-btn.ready {
      background: var(--accent-grad);
      box-shadow: var(--gold-glow);
    }
    .next-card {
      margin-top: 18px;
    }
    .next-card ul {
      color: var(--ink-2);
      margin: 10px 0 0 20px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top-chrome">
      <div>
        <div class="top-title">金钱剪刀</div>
        <div class="top-sub">备用下载入口。主流程以提交助教审核为准。</div>
      </div>
      <div class="top-actions">
        <a class="secondary-btn inline-btn" href="/training/path.html">训练台</a>
        <a class="secondary-btn inline-btn" href="/orders/">接单台</a>
        <a class="secondary-btn inline-btn" href="/projects">我的项目</a>
        <a class="secondary-btn inline-btn" id="admin-link" href="admin.html" hidden>后台</a>
        <span class="user-chip" id="user-phone"></span>
        <button class="secondary-btn inline-btn" id="logout-btn" type="button">退出</button>
      </div>
    </header>

    <header class="brand">
      <h1>金钱剪刀 💰✂️</h1>
      <p>把当前删减结果生成可下载 MP3，方便自己先听一遍。</p>
    </header>

    <section class="card">
      <div class="label">剪辑执行</div>
      <div class="cut-status" id="status">准备剪辑</div>
      <div class="cut-detail" id="detail">正在读取审查页导出的删除段。</div>
      <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
      <div class="error" id="error"></div>
      <div class="download-row">
        <button class="primary-btn" id="download-btn" disabled>下载成品 MP3</button>
      </div>
    </section>

    <section class="card next-card">
      <div class="label">下一步</div>
      <p>这份 MP3 是备用下载文件。正式作业状态请回到我的项目查看助教审核结果。</p>
      <ul>
        <li>Adobe Audition / Logic：降噪、响度、精修</li>
        <li>剪映 / Audacity：免费剪辑和片头片尾</li>
      </ul>
    </section>
  </main>

  <script type="module" src="js/cut.js?v=20260611-download-1"></script>
</body>
</html>
