<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>金钱剪刀 · 战报</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f5f0e8;
  --gold:#c8952a;--gold2:#e8b84b;--gold3:#f5d06a;
  --gold-border:rgba(200,149,42,0.25);
  --gold-border2:rgba(200,149,42,0.15);
  --text-dark:#1a1209;--text-mid:#5a4a2a;
  --text-muted:#9a8a6a;--text-pale:#b8a070;
  --green:#387A4A;
  --card-bg:rgba(255,252,240,0.9);
  --card-shadow:0 2px 12px rgba(180,130,20,0.10);
}
body{background:var(--cream);font-family:'Noto Sans SC',sans-serif;color:var(--text-dark);min-height:100vh;}

/* ── Nav ── */
nav{display:flex;align-items:center;padding:0 28px;height:52px;
  background:linear-gradient(90deg,#2A1A04,#3D2808 40%,#2A1A04);
  border-bottom:1px solid rgba(200,148,10,0.4);gap:36px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-img{width:30px;height:30px;background:linear-gradient(135deg,#F0C030,#A07010);
  border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-name{font-size:14px;font-weight:700;color:#F5D870;letter-spacing:1px;}
.logo-sub{font-size:9px;color:rgba(200,160,80,0.7);margin-top:1px;}
nav ul{display:flex;list-style:none;gap:2px;flex:1;}
nav ul a{color:rgba(220,190,120,0.7);text-decoration:none;font-size:12px;
  padding:5px 14px;border-radius:4px;transition:all .2s;}
nav ul a:hover,nav ul a.active{color:#F5D870;background:rgba(240,200,60,0.12);}
.updated-at{font-size:11px;color:rgba(200,160,80,0.5);}

/* ── Page ── */
.page{padding:22px 28px 36px;max-width:1280px;margin:0 auto;}
.page-header{margin-bottom:22px;}
.batch-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--text-muted);
  background:rgba(200,148,10,0.1);border:1px solid var(--gold-border);
  padding:2px 10px;border-radius:3px;margin-bottom:6px;letter-spacing:1px;}
.page-title{font-family:'Noto Serif SC',serif;font-size:40px;font-weight:700;
  color:var(--text-dark);letter-spacing:2px;line-height:1;}
.page-title .mid{color:var(--gold);margin:0 4px;}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px;}
.kpi-card{background:var(--card-bg);border:1px solid var(--gold-border);border-radius:12px;
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  box-shadow:var(--card-shadow);position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);opacity:.7;}
.kpi-icon{width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:linear-gradient(135deg,rgba(240,200,60,0.2),rgba(200,148,10,0.08));
  border:1px solid rgba(200,148,10,0.2);}
.kpi-label{font-size:11px;color:var(--text-muted);margin-bottom:3px;}
.kpi-value{font-size:28px;font-weight:700;color:var(--text-dark);line-height:1;}
.kpi-value .unit{font-size:13px;font-weight:400;margin-left:1px;color:var(--text-mid);}

/* ── Main grid ── */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:var(--card-bg);border:1px solid var(--gold-border);
  border-radius:12px;padding:16px;box-shadow:var(--card-shadow);}
.card-title{font-size:11px;color:var(--text-muted);letter-spacing:1px;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:3px;height:11px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  border-radius:2px;flex-shrink:0;}

/* ── Ranking list ── */
.list-col-header{display:flex;justify-content:space-between;
  font-size:10px;color:var(--text-pale);padding:0 8px 6px;letter-spacing:.5px;}
.student-list{display:flex;flex-direction:column;gap:6px;}
.student-item{display:flex;align-items:center;gap:8px;padding:7px 8px;
  border-radius:8px;transition:background .2s;}
.student-item:hover{background:rgba(200,148,10,0.06);}
.rank-badge{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.r1{background:linear-gradient(135deg,#FFD700,#B8860B);color:#fff;}
.r2{background:linear-gradient(135deg,#C0C0C0,#808080);color:#fff;}
.r3{background:linear-gradient(135deg,#CD7F32,#8B4513);color:#fff;}
.rn{background:rgba(200,148,10,0.12);color:var(--text-muted);}
.s-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;}
.s-name{font-size:13px;color:var(--text-dark);flex:1;}
.s-orders{font-size:11px;color:var(--text-muted);min-width:36px;text-align:center;}
.s-earnings{font-size:13px;font-weight:700;color:var(--gold);
  background:rgba(200,148,10,0.1);border-radius:4px;padding:1px 8px;min-width:52px;text-align:center;}
.s-pts{font-size:11px;color:var(--text-muted);min-width:36px;text-align:right;}

/* ── Stats panel ── */
.stat-list{display:flex;flex-direction:column;gap:12px;}
.stat-item{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:linear-gradient(90deg,rgba(200,148,10,0.05),rgba(200,148,10,0.02));
  border:1px solid var(--gold-border2);border-radius:10px;}
.stat-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.stat-val{font-size:26px;font-weight:700;color:var(--text-dark);}
.stat-val .unit{font-size:14px;font-weight:400;color:var(--text-mid);}

/* donut */
.donut-ring{transition:stroke-dashoffset .8s ease;}

/* avatar colors */
.av-0{background:linear-gradient(135deg,#E07040,#A04020);}
.av-1{background:linear-gradient(135deg,#4080D0,#204890);}
.av-2{background:linear-gradient(135deg,#40B060,#206030);}
.av-3{background:linear-gradient(135deg,#C040A0,#702070);}
.av-4{background:linear-gradient(135deg,#D0A040,#806010);}
.av-5{background:linear-gradient(135deg,#8060C0,#402080);}
.av-6{background:linear-gradient(135deg,#4090A0,#205060);}
.av-7{background:linear-gradient(135deg,#B04040,#601010);}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-img">✂️</div>
    <div>
      <div class="logo-name">金钱剪刀</div>
      <div class="logo-sub">播客剪辑工作台</div>
    </div>
  </div>
  <ul>
    <li><a href="../html/金钱剪刀首页.html">首页</a></li>
    <li><a href="接单台训练营内派单.html">接单大厅</a></li>
    <li><a href="接待台排行榜.html" class="active">营内排行</a></li>
  </ul>
  <span class="updated-at" id="updatedAt"></span>
</nav>

<div class="page">
  <div class="page-header">
    <div class="batch-tag">剪辑营战报</div>
    <div class="page-title">播客剪辑营<span class="mid">·</span>战报</div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-icon">📋</div>
      <div>
        <div class="kpi-label">总单数</div>
        <div class="kpi-value" id="kpiTotal">–<span class="unit">单</span></div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">✅</div>
      <div>
        <div class="kpi-label">已完成</div>
        <div class="kpi-value" id="kpiDone">–<span class="unit">单</span></div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">👥</div>
      <div>
        <div class="kpi-label">参与学员</div>
        <div class="kpi-value" id="kpiStudents">–<span class="unit">人</span></div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">💰</div>
      <div>
        <div class="kpi-label">学员总收入</div>
        <div class="kpi-value">¥<span id="kpiEarnings">–</span></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-grid">
    <!-- 排行榜 -->
    <div class="card">
      <div class="card-title">学员收入排行</div>
      <div class="list-col-header">
        <span>学员</span>
        <span style="display:flex;gap:36px">
          <span>接单数</span><span>总收入</span><span>积分</span>
        </span>
      </div>
      <div class="student-list" id="rankingList">
        <div style="color:var(--text-muted);font-size:12px;padding:20px 0;text-align:center">加载中...</div>
      </div>
    </div>

    <!-- 总结数据 -->
    <div class="card">
      <div class="card-title">本期总结</div>
      <div class="stat-list">
        <div class="stat-item">
          <div>
            <div class="stat-label">完成率</div>
            <div class="stat-val"><span id="statCompletion">–</span><span class="unit">%</span></div>
          </div>
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(200,148,10,0.12)" stroke-width="7"/>
            <circle id="donutCompletion" cx="30" cy="30" r="22" fill="none"
              stroke="var(--gold2)" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="138.2" stroke-dashoffset="138.2"
              class="donut-ring" transform="rotate(-90 30 30)"/>
          </svg>
        </div>
        <div class="stat-item">
          <div>
            <div class="stat-label">已完成单数</div>
            <div class="stat-val"><span id="statDone">–</span><span class="unit"> 单</span></div>
          </div>
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(200,148,10,0.12)" stroke-width="7"/>
            <circle id="donutDone" cx="30" cy="30" r="22" fill="none"
              stroke="#4A9A5A" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="138.2" stroke-dashoffset="138.2"
              class="donut-ring" transform="rotate(-90 30 30)"/>
          </svg>
        </div>
        <div class="stat-item">
          <div>
            <div class="stat-label">参与学员</div>
            <div class="stat-val"><span id="statStudents">–</span><span class="unit"> 人</span></div>
          </div>
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(200,148,10,0.12)" stroke-width="7"/>
            <circle id="donutStudents" cx="30" cy="30" r="22" fill="none"
              stroke="var(--gold3)" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="138.2" stroke-dashoffset="0"
              class="donut-ring" transform="rotate(-90 30 30)"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const AVATAR_COLORS = ['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7'];

function avatarChar(name) {
  return name ? name[0].toUpperCase() : '?';
}

function setDonut(id, pct) {
  const circ = 138.2;
  const offset = circ * (1 - Math.min(pct, 1));
  document.getElementById(id).style.strokeDashoffset = offset;
}

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    const ov = data.overview;
    const ranking = data.ranking;

    // KPI
    document.getElementById('kpiTotal').innerHTML = ov.total_orders + '<span class="unit">单</span>';
    document.getElementById('kpiDone').innerHTML = ov.completed_orders + '<span class="unit">单</span>';
    document.getElementById('kpiStudents').innerHTML = ov.student_count + '<span class="unit">人</span>';
    const totalEarnings = ranking.reduce((s, r) => s + r.earnings, 0);
    document.getElementById('kpiEarnings').textContent = totalEarnings.toLocaleString();
    document.getElementById('updatedAt').textContent = '数据更新：' + data.updated_at;

    // Stats
    document.getElementById('statCompletion').textContent = ov.completion_rate;
    document.getElementById('statDone').textContent = ov.completed_orders;
    document.getElementById('statStudents').textContent = ov.student_count;
    setTimeout(() => {
      setDonut('donutCompletion', ov.completion_rate / 100);
      setDonut('donutDone', ov.completed_orders / ov.total_orders);
      setDonut('donutStudents', 1);
    }, 100);

    // Ranking
    const list = document.getElementById('rankingList');
    list.innerHTML = '';
    ranking.forEach((s, i) => {
      const badgeClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
      const avClass = AVATAR_COLORS[i % AVATAR_COLORS.length];
      const item = document.createElement('div');
      item.className = 'student-item';
      item.innerHTML = `
        <div class="rank-badge ${badgeClass}">${s.rank}</div>
        <div class="s-avatar ${avClass}">${avatarChar(s.name)}</div>
        <div class="s-name">${s.name}</div>
        <div class="s-orders">${s.orders}单</div>
        <div class="s-earnings">¥${s.earnings}</div>
        <div class="s-pts">${s.points}分</div>
      `;
      list.appendChild(item);
    });
  })
  .catch(() => {
    document.getElementById('rankingList').innerHTML =
      '<div style="color:var(--text-muted);font-size:12px;padding:20px;text-align:center">数据加载失败，请检查 data.json 是否存在</div>';
  });
</script>
</body>
</html>
