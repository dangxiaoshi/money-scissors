<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>接单台</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f1e5;
      color: #2a1808;
    }
    main {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }
    .sub {
      margin: 0 0 26px;
      color: #7d684b;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    a {
      min-height: 142px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      border: 1px solid #e6d6b8;
      border-radius: 8px;
      background: #fffaf0;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(83, 54, 14, 0.08);
    }
    .title {
      font-size: 20px;
      font-weight: 800;
    }
    .desc {
      margin-top: 10px;
      color: #806a4c;
      line-height: 1.55;
      font-size: 14px;
    }
    .go {
      margin-top: 18px;
      color: #a06f21;
      font-weight: 800;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      main { padding-top: 28px; }
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>接单台</h1>
    <p class="sub">三个页面都在这里，直接点进去。</p>
    <section class="grid">
      <a href="./接单台训练营内派单.html">
        <div>
          <div class="title">训练营内派单</div>
          <div class="desc">看当前订单、接单状态、素材入口和自己的任务。</div>
        </div>
        <div class="go">进入页面</div>
      </a>
      <a href="./接单台播客主vs剪辑手对接.html">
        <div>
          <div class="title">播客主 vs 剪辑手对接</div>
          <div class="desc">播客主和剪辑手之间的对接展示页。</div>
        </div>
        <div class="go">进入页面</div>
      </a>
      <a href="./接待台排行榜.html">
        <div>
          <div class="title">排行榜</div>
          <div class="desc">查看接单表现和营内排行。</div>
        </div>
        <div class="go">进入页面</div>
      </a>
    </section>
  </main>
</body>
</html>
