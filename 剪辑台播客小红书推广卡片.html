<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金钱剪刀 · 推广卡片生成</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  :root {
    --gold-1: #c8952a;
    --gold-2: #e8b84b;
    --gold-3: #f5d06a;
    --text-dark: #1a1209;
    --text-mid: #5a4a2a;
    --text-light: #9a8a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
    background: #f5f0e8;
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid rgba(200,149,42,0.2);
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #c8952a, #f5d06a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header span { font-size: 22px; }
  .main {
    display: flex;
    flex: 1;
    gap: 0;
    overflow: hidden;
  }
  .panel-left {
    width: 340px;
    min-width: 300px;
    padding: 28px 24px;
    border-right: 1px solid rgba(200,149,42,0.2);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .panel-right {
    flex: 1;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(200,149,42,0.25);
    border-radius: 10px;
    color: var(--text-dark);
    font-size: 14px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--gold-1); }
  .style-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .style-btn {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(200,149,42,0.2);
    border-radius: 8px;
    color: var(--text-mid);
    font-size: 13px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: inherit;
  }
  .style-btn:hover { border-color: var(--gold-1); color: var(--text-dark); }
  .style-btn.active {
    border-color: var(--gold-1);
    background: rgba(200,149,42,0.12);
    color: var(--gold-1);
    font-weight: 600;
  }
  .size-row {
    display: flex;
    gap: 8px;
  }
  .size-row input {
    width: 70px;
    background: rgba(255,255,255,0.85);
    border: 1px solid rgba(200,149,42,0.25);
    border-radius: 8px;
    color: var(--text-dark);
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    text-align: center;
    font-family: inherit;
  }
  .size-row input:focus { border-color: var(--gold-1); }
  .size-row span { line-height: 36px; color: var(--text-light); font-size: 13px; }
  .gen-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #b8821e, #c8952a, #e8b84b);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(200,149,42,0.4);
    font-family: inherit;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:active { transform: scale(0.98); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .preview-label {
    font-size: 13px;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    align-self: flex-start;
  }
  .preview-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(200,149,42,0.25), 0 8px 32px rgba(200,149,42,0.12);
    background: #fff;
  }
  #preview-frame {
    display: block;
    border: none;
    background: #fff;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-mid);
    font-size: 14px;
  }
  .placeholder-icon { font-size: 48px; opacity: 0.4; }
  .actions {
    display: flex;
    gap: 10px;
  }
  .action-btn {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(200,149,42,0.25);
    background: rgba(255,255,255,0.7);
    color: var(--text-mid);
    font-family: inherit;
  }
  .action-btn:hover { border-color: var(--gold-1); color: var(--text-dark); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status {
    font-size: 13px;
    color: var(--text-light);
    min-height: 20px;
    text-align: center;
  }
  .status.loading { color: var(--gold-1); }
  .status.error { color: #c0392b; }
  .status.success { color: #2d7a4f; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(200,149,42,0.3);
    border-top-color: var(--gold-1);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { border: none; border-top: 1px solid rgba(200,149,42,0.15); }

/* ── 统一顶部导航栏 ── */
.jjd-topbar{display:flex;align-items:center;gap:12px;padding:11px 22px;background:rgba(245,240,232,0.97);border-bottom:1px solid rgba(200,149,42,0.2);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;}
.jjd-topbar-logo{width:28px;height:28px;background:linear-gradient(135deg,#f5d06a,#c8952a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 2px 6px rgba(200,149,42,0.3);}
.jjd-topbar-name{font-size:15px;font-weight:700;color:#1a1209;letter-spacing:-0.2px;}
.jjd-topbar-back{margin-left:auto;font-size:13px;color:#9a8a6a;text-decoration:none;padding:5px 11px;border-radius:7px;border:1px solid transparent;transition:all 0.15s;}
.jjd-topbar-back:hover{background:rgba(200,149,42,0.1);color:#c8952a;border-color:rgba(200,149,42,0.2);}
</style>
</head>
<body>

<header>
  <span>✦</span>
  <h1>AI 卡片生成器</h1>
</header>

<div class="main">
  <div class="panel-left">
    <div>
      <label>提示词</label>
      <textarea id="prompt" placeholder="描述你想要的卡片内容，例如：&#10;一张关于「深夜读书」的文艺卡片，配上一句诗意的话"></textarea>
    </div>

    <div>
      <label>卡片风格</label>
      <div class="style-grid">
        <button class="style-btn active" data-style="minimal">简约白</button>
        <button class="style-btn" data-style="gradient">渐变色</button>
        <button class="style-btn" data-style="dark">暗黑风</button>
        <button class="style-btn" data-style="business">商务蓝</button>
      </div>
    </div>

    <div>
      <label>卡片尺寸（px）</label>
      <div class="size-row">
        <input type="number" id="card-w" value="400" min="200" max="800">
        <span>×</span>
        <input type="number" id="card-h" value="600" min="200" max="1200">
      </div>
    </div>

    <hr class="divider">

    <button class="gen-btn" id="gen-btn" onclick="generate()">生成卡片</button>
    <div class="status" id="status"></div>
  </div>

  <div class="panel-right">
    <div class="preview-label">预览</div>
    <div class="preview-wrap" id="preview-wrap">
      <div class="placeholder" id="placeholder" style="width:400px;height:600px">
        <div class="placeholder-icon">🃏</div>
        <div>输入提示词，点击生成</div>
      </div>
      <iframe id="preview-frame" style="display:none"></iframe>
    </div>
    <div class="actions">
      <button class="action-btn" id="copy-btn" disabled onclick="copyCode()">复制代码</button>
      <button class="action-btn" id="dl-btn" disabled onclick="downloadImage()">下载图片</button>
    </div>
  </div>
</div>

<script>
const API_KEY = '__FILL_BEFORE_LOCAL_USE__';
const API_URL = 'https://api.hardon.work/v1/messages';
const MODEL = 'claude-sonnet-4-6';

let currentCode = '';
let selectedStyle = 'minimal';

const styleDescriptions = {
  minimal: '简约白色风格，干净留白，黑色文字，细线装饰，现代感',
  gradient: '渐变色背景（紫色到蓝色或橙色到粉色），色彩鲜艳，白色文字，视觉冲击力强',
  dark: '暗黑赛博朋克风格：背景用深色（如#0f0f13或#1a1a2e），文字必须用亮色（白色、浅灰或霓虹色如#a78bfa/#60a5fa/#f472b6），标题用渐变霓虹色，加入发光glow效果（text-shadow），用几何线条或网格作为装饰，整体科技感强，绝对不能出现黑色文字',
  business: '商务蓝风格，深蓝色调，专业排版，适合企业/职场内容'
};

document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStyle = btn.dataset.style;
  });
});

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { setStatus('请输入提示词', 'error'); return; }

  const w = parseInt(document.getElementById('card-w').value) || 400;
  const h = parseInt(document.getElementById('card-h').value) || 600;

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  setStatus('正在生成...', 'loading');

  const systemPrompt = `你是一个专业的卡片设计师。用户给你一个主题，你需要生成一个精美的 HTML 卡片。

要求：
- 只返回一个完整的 HTML 代码块，不要任何解释文字
- 卡片尺寸固定为 ${w}px × ${h}px
- 所有 CSS 必须内联在 <style> 标签中，不依赖任何外部资源
- 不使用任何 JavaScript
- 风格要求：${styleDescriptions[selectedStyle]}
- 排版精美，内容丰富，有设计感
- 可以使用 Unicode 符号、emoji 作为装饰元素
- 代码格式：直接输出 HTML，从 <!DOCTYPE html> 或 <html> 开始，或者只输出 <div> 片段也可以

只输出 HTML 代码，不要 markdown 代码块标记，不要任何说明。`;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    let code = data.content?.[0]?.text || '';

    // Strip markdown code fences if present
    code = code.replace(/^```[\w]*\n?/m, '').replace(/\n?```$/m, '').trim();

    if (!code) throw new Error('AI 返回内容为空');

    currentCode = code;
    renderPreview(code, w, h);
    setStatus('生成成功', 'success');
    document.getElementById('copy-btn').disabled = false;
    document.getElementById('dl-btn').disabled = false;
  } catch (e) {
    setStatus('生成失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function renderPreview(code, w, h) {
  const wrap = document.getElementById('preview-wrap');
  const frame = document.getElementById('preview-frame');
  const placeholder = document.getElementById('placeholder');

  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
  wrap.style.width = w + 'px';
  wrap.style.height = h + 'px';

  placeholder.style.display = 'none';
  frame.style.display = 'block';

  // Write into iframe for isolation
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}

function copyCode() {
  if (!currentCode) return;
  navigator.clipboard.writeText(currentCode).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function downloadImage() {
  if (!currentCode) return;
  const btn = document.getElementById('dl-btn');
  btn.textContent = '生成中...';
  btn.disabled = true;

  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:400px;';
  tmp.innerHTML = currentCode;
  document.body.appendChild(tmp);

  html2canvas(tmp, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
    const a = document.createElement('a');
    a.download = '推广卡片-' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    document.body.removeChild(tmp);
    btn.textContent = '下载图片';
    btn.disabled = false;
  }).catch(() => {
    document.body.removeChild(tmp);
    btn.textContent = '下载图片';
    btn.disabled = false;
  });
}

// Allow Ctrl+Enter to generate
document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
});
</script>
</body>
</html>
